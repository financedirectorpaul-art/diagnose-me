<!DOCTYPE html>
<html>
<head>
<title>Diagnose Me</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
body{font-family:Arial;background:#0f172a;margin:0;color:#e5e7eb}
.container{display:grid;grid-template-columns:260px 1fr;height:100vh}
.sidebar{background:#020617;padding:20px}
.sidebar div{margin-bottom:10px;cursor:pointer}
.chat{padding:20px;height:55vh;overflow:auto}
.bubble{padding:10px;margin:10px;border-radius:10px;max-width:70%}
.user{background:#7c3aed;margin-left:auto}
.ai{background:#1e293b}
input,textarea{width:100%;padding:10px;margin-top:10px;background:#020617;color:white;border:1px solid #334155}
button{margin-top:10px;padding:10px;background:#7c3aed;border:none;color:white}
.clickable{color:#a78bfa;cursor:pointer}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
  <div onclick="showChat()">Clinical Chat</div>
  <div onclick="showDiagnostics()">Diagnostics</div>
  <div onclick="showDocs()">Documentation Assistant</div>
  <div onclick="showDRG()">DRG Engine</div>
  <div onclick="showCases()">Case Tracking</div>
  <div onclick="showMetrics()">Metrics</div>
</div>

<div id="main"></div>

</div>

<script>

// ================= STATE =================
let conversation={symptoms:"",answers:[],stage:"initial"};
let pendingQuestions=[];
let documentation=[];

// ================= CHAT =================

function showChat(){
main.innerHTML=`
<div id="chat" class="chat"></div>
<input id="input" placeholder="Describe symptoms">
<button onclick="send()">Send</button>
<textarea id="note"></textarea>
<button onclick="downloadNote()">Download Note</button>
<button onclick="newConsult()">New Consultation</button>
`;

addAI("Start a consultation — tell me your symptoms.");
}

function addUser(t){chat.innerHTML+=`<div class="bubble user">${t}</div>`}
function addAI(t){chat.innerHTML+=`<div class="bubble ai">${t}</div>`}

// ================= SEND =================

async function send(){

let t=input.value.trim();
if(!t) return;

addUser(t);
input.value="";

if(conversation.stage==="initial"){
conversation.symptoms=t;
conversation.stage="followup";
await askAI();
return;
}

if(conversation.stage==="followup"){
conversation.answers.push(t);

if(pendingQuestions.length>0) pendingQuestions.shift();

if(pendingQuestions.length>0){
addAI(pendingQuestions[0]);
return;
}

conversation.stage="final";
await askAI(true);
return;
}

}

// ================= AI =================

async function askAI(final=false){

addAI("Thinking...");

const res=await fetch("/ai/personal-check",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify(conversation)
});

const data=await res.json();

chat.lastChild.remove();

if(!final && data.follow_up_questions?.length){
pendingQuestions=data.follow_up_questions;
addAI(pendingQuestions[0]);
return;
}

renderFinal(data);
}

function renderFinal(data){

let out=`<b>${data.overall_assessment}</b><br>`;

if(data.revenue_prompts){
data.revenue_prompts.forEach(p=>{
out+=`<br><span class="clickable" onclick="addDoc('${p.message}')">${p.message}</span>`;
});
}

addAI(out);
}

// ================= DOC =================

function addDoc(t){
documentation.push(t);
note.value=documentation.join("\n");
}

function downloadNote(){
const blob=new Blob([note.value]);
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="note.txt";
a.click();
}

function newConsult(){
conversation={symptoms:"",answers:[],stage:"initial"};
pendingQuestions=[];
chat.innerHTML="";
addAI("New consultation started.");
}

// ================= DIAGNOSTICS =================

function showDiagnostics(){
main.innerHTML=`
<textarea id="desc"></textarea>
<input type="file" id="img">
<button onclick="runDiag()">Analyse</button>
<div id="out"></div>
`;
}

async function runDiag(){

let file=img.files[0];
let base64=null;

if(file){
const reader=new FileReader();
base64=await new Promise(r=>{
reader.onload=()=>r(reader.result.split(",")[1]);
reader.readAsDataURL(file);
});
}

const res=await fetch("/ai/diagnostics-assist",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({description:desc.value,imageBase64:base64})
});

const data=await res.json();

out.innerHTML=data.image_assessment;
}

// ================= DOC ASSIST =================

function showDocs(){
main.innerHTML=`
<textarea id="docNote"></textarea>
<button onclick="analyse()">Analyse</button>
<div id="out"></div>
`;
}

async function analyse(){
const res=await fetch("/ai/clinical-assist",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({note:docNote.value})
});
const data=await res.json();
out.innerHTML=data.suggestions.join("<br>");
}

// ================= DRG =================

function showDRG(){
main.innerHTML=`
<input id="dx">
<button onclick="runDRG()">Estimate</button>
<div id="out"></div>
`;
}

async function runDRG(){
const res=await fetch("/drg/estimate",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({diagnosis:dx.value})
});
const data=await res.json();

out.innerHTML=`$${data.funding}
<input id="actual">
<button onclick="save(${data.funding})">Save</button>`;
}

async function save(pred){
await fetch("/pilot/track",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({predicted:pred,actual:Number(actual.value)})
});
alert("Saved");
}

// ================= CASES =================

async function showCases(){
const res=await fetch("/pilot/data");
const data=await res.json();
main.innerHTML=data.map(r=>`${r.predicted} vs ${r.actual}<br>`).join("");
}

// ================= METRICS =================

async function showMetrics(){
const res=await fetch("/pilot/metrics");
const d=await res.json();
main.innerHTML=`Predicted:${d.predicted}<br>Actual:${d.actual}<br>Delta:${d.delta}`;
}

showChat();

</script>

</body>
</html>
