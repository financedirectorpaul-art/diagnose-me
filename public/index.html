<!DOCTYPE html>
<html>
<head>
  <title>Diagnose Me</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body{margin:0;background:#0f172a;color:#e5e7eb;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
    .layout{display:grid;grid-template-columns:260px 1fr;height:100vh}
    .sidebar{background:#020617;border-right:1px solid #1e293b;padding:18px}
    .brand{font-size:20px;font-weight:800;margin-bottom:20px}
    .nav{padding:10px;border-radius:10px;cursor:pointer;margin-bottom:8px;color:#cbd5e1}
    .nav:hover{background:#1e293b;color:white}
    .main{display:flex;flex-direction:column;height:100vh;overflow:hidden}
    .doctor{display:flex;align-items:center;gap:12px;padding:14px 20px;background:#020617;border-bottom:1px solid #1e293b}
    .avatar{width:64px;height:64px;border-radius:50%;background:#1e293b;overflow:hidden;border:3px solid #7c3aed}
    .avatar img{width:100%;height:100%;object-fit:cover}
    .doctor-name{font-weight:700;font-size:18px}
    .doctor-sub{color:#94a3b8;font-size:13px}
    .mode-toggle{display:flex;gap:8px;margin-left:auto;background:#1e293b;border-radius:9999px;padding:4px}
    .mode-btn{padding:6px 16px;border-radius:9999px;font-size:13px;cursor:pointer}
    .mode-btn.active{background:#7c3aed;color:white}
    .gender-toggle{display:flex;gap:8px;margin-left:12px}
    .gender-btn{padding:6px 14px;border-radius:9999px;font-size:13px;cursor:pointer;background:#1e293b;color:#cbd5e1}
    .gender-btn.active{background:#7c3aed;color:white}
    .chat{flex:1;overflow-y:auto;padding:22px;scroll-behavior:smooth}
    .row{display:flex;gap:10px;margin-bottom:12px}.user-row{justify-content:flex-end}
    .bubble{max-width:75%;padding:13px 15px;border-radius:14px;line-height:1.45;white-space:pre-wrap}
    .ai{background:#1e293b;border:1px solid #334155}
    .user{background:#7c3aed}
    .inputbar{display:flex;gap:10px;padding:14px;background:#020617;border-top:1px solid #1e293b}
    input,textarea{width:100%;box-sizing:border-box;background:#020617;color:white;border:1px solid #334155;border-radius:10px;padding:11px;margin-top:8px}
    button{background:#7c3aed;color:white;border:none;padding:10px 14px;border-radius:10px;cursor:pointer;font-weight:700;margin-top:8px}
    button.secondary{background:#334155}
    .mic-btn{font-size:24px;width:52px;height:52px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:#7c3aed;margin-top:8px}
    .listening{animation: pulse 1.5s infinite}
    @keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
    .panel{padding:18px;background:#020617;border-top:1px solid #1e293b;max-height:340px;overflow-y:auto}
    .card{background:#020617;border:1px solid #1e293b;border-radius:16px;padding:22px;margin:22px}
    .box{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:13px;margin-top:10px}
    .clickable{color:#c4b5fd;text-decoration:underline;cursor:pointer}
    table{width:100%;border-collapse:collapse;margin-top:14px}th,td{border-bottom:1px solid #334155;padding:9px;text-align:left;vertical-align:top}th{color:#c4b5fd}
    .metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.metric{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:16px}.metric b{display:block;font-size:24px;margin-top:5px}
    pre{white-space:pre-wrap;max-width:600px}
  </style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <div class="brand">Diagnose Me</div>
    <div class="nav" onclick="showChat()">Clinical Chat</div>
    <div class="nav" onclick="showDiagnostics()">Diagnostics</div>
    <div class="nav" onclick="showDocumentation()">Documentation Assistant</div>
    <div class="nav" onclick="showFunding()">Funding Estimator</div>
    <div class="nav" onclick="showCases()">Case Tracking</div>
    <div class="nav" onclick="showMetrics()">Metrics</div>
    <div class="nav" onclick="showAudit()">Audit Trail</div>
  </div>
  <div id="app" class="main"></div>
</div>

<script>
let conversation={symptoms:"",answers:[],questionIndex:0};
let latestAI=null;
let documentation=[];
let activePrompts=[];
let isWaiting=false;
let currentDoctor="female";
let chatMode="guided";

// Voice system
let voices = [];
let voiceReady = false;

function loadVoices() {
  voices = speechSynthesis.getVoices();
  if (voices.length > 0) voiceReady = true;
}

// Load voices immediately and listen for update
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices(); // some browsers need this call
}

const doctorProfiles = {
  female: { name:"Dr. Elena Voss", title:"Clinical AI consultation assistant", avatar:"https://randomuser.me/api/portraits/women/44.jpg", voice:"female" },
  male:   { name:"Dr. James Harper", title:"Clinical AI consultation assistant", avatar:"https://randomuser.me/api/portraits/men/32.jpg",   voice:"male" }
};

function speak(text) {
  if (!('speechSynthesis' in window) || !voiceReady) {
    console.warn("Voices not ready yet");
    return;
  }
  const utterance = new SpeechSynthesisUtterance(text);
  const profile = doctorProfiles[currentDoctor];

  // Prefer Australian English voices first
  let selected = voices.find(v => v.lang === "en-AU" || v.lang === "en-AU") ||
                 voices.find(v => 
                   (profile.voice === "female" && 
                    (/female|karen|tessa|alice|samantha|emma|olivia/i.test(v.name) || v.name.toLowerCase().includes("zira"))) ||
                   (profile.voice === "male" && 
                    (/male|james|david|daniel|oliver|henry/i.test(v.name) || v.name.toLowerCase().includes("david")))
                 ) ||
                 voices[0]; // final fallback

  utterance.voice = selected;
  utterance.pitch = profile.voice === "female" ? 1.1 : 0.95;
  utterance.rate = 0.97;
  speechSynthesis.speak(utterance);
}

function startVoiceInput() {
  if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
    alert("Voice input not supported in this browser. Please use Chrome or Edge.");
    return;
  }
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-AU";
  const micBtn = document.getElementById("micBtn");
  if (micBtn) micBtn.classList.add("listening");
  recognition.onresult = e => {
    const transcript = e.results[0][0].transcript;
    const input = document.getElementById("input");
    if (input) { input.value = transcript; send(); }
  };
  recognition.onerror = recognition.onend = () => { if (micBtn) micBtn.classList.remove("listening"); };
  recognition.start();
}

function switchDoctor(gender) {
  currentDoctor = gender;
  document.querySelectorAll('.gender-btn').forEach(b => b.classList.toggle('active', b.dataset.gender===gender));
  showChat();
}

function setMode(mode) {
  chatMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode===mode));
  showChat();
}

function money(n){return "$"+Number(n||0).toLocaleString();}
function scrollChat(){const chat=document.getElementById("chat");if(chat)chat.scrollTop=chat.scrollHeight;}
function copyText(id){navigator.clipboard.writeText(document.getElementById(id).value);alert("Copied");}

function showChat(){
  conversation={symptoms:"",answers:[],questionIndex:0};
  latestAI=null;activePrompts=[];isWaiting=false;
  document.getElementById("app").innerHTML=`
    <div class="doctor">
      <div class="avatar"><img src="${doctorProfiles[currentDoctor].avatar}" alt="Doctor"></div>
      <div>
        <div class="doctor-name">${doctorProfiles[currentDoctor].name}</div>
        <div class="doctor-sub">${doctorProfiles[currentDoctor].title}</div>
      </div>
      <div class="mode-toggle">
        <div class="mode-btn ${chatMode==='guided'?'active':''}" data-mode="guided" onclick="setMode('guided')">Guided Triage</div>
        <div class="mode-btn ${chatMode==='free'?'active':''}" data-mode="free" onclick="setMode('free')">Ask Doctor Anything</div>
      </div>
      <div class="gender-toggle">
        <div class="gender-btn ${currentDoctor==='female'?'active':''}" data-gender="female" onclick="switchDoctor('female')">👩‍⚕️ Female</div>
        <div class="gender-btn ${currentDoctor==='male'?'active':''}" data-gender="male" onclick="switchDoctor('male')">👨‍⚕️ Male</div>
      </div>
    </div>
    <div id="chat" class="chat"></div>
    <div class="panel">
      <b>Structured Clinical Note</b>
      <textarea id="note"></textarea>
      <button onclick="generateNote()">Generate Note</button>
      <button class="secondary" onclick="copyText('note')">Copy Note</button>
      <br><br>
      <b>FHIR R4 Bundle</b>
      <textarea id="fhir"></textarea>
      <button onclick="generateFHIR()">Generate FHIR</button>
      <button class="secondary" onclick="copyText('fhir')">Copy FHIR</button>
      <br><br>
      <b>Clinician Override</b>
      <input id="overrideName" placeholder="Clinician name">
      <textarea id="overrideReason" placeholder="Reason for override"></textarea>
      <textarea id="overrideAssessment" placeholder="Clinician override assessment"></textarea>
      <button onclick="submitOverride()">Submit Override</button>
    </div>
    <div class="inputbar">
      <input id="input" placeholder="${chatMode==='free'?'Ask the doctor any question (e.g. best treatment for arthritis)...':'Describe symptoms or speak your answer...'}"/>
      <button onclick="send()">Send</button>
      <button class="mic-btn" id="micBtn" onclick="startVoiceInput()" title="Speak">🎤</button>
      <button class="secondary" onclick="showChat()">New Chat</button>
    </div>`;

  document.getElementById("input").addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();send();}});
  addAI(`Hi, I'm ${doctorProfiles[currentDoctor].name.split(" ")[1]}. How can I help you today?`);
}

function addAI(text){
  const chat=document.getElementById("chat");
  chat.innerHTML+=`<div class="row"><div class="avatar" style="width:42px;height:42px;overflow:hidden;border-radius:50%;"><img src="${doctorProfiles[currentDoctor].avatar}" style="width:100%;height:100%;object-fit:cover"></div><div class="bubble ai">${text}</div></div>`;
  scrollChat();
  speak(text);
}

function addUser(text){
  const chat=document.getElementById("chat");
  chat.innerHTML+=`<div class="row user-row"><div class="bubble user">${text}</div></div>`;
  scrollChat();
}

// === send(), renderFinal(), generateNote(), generateFHIR(), submitOverride() and all other functions are unchanged from previous version ===
// (They are exactly the same as the last full file I gave you)

async function send(){
  if(isWaiting) return;
  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;
  addUser(text);
  input.value="";
  isWaiting=true;
  addAI("Thinking...");

  let res, data;
  if(chatMode === "free"){
    res = await fetch("/ai/ask-doctor", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({question: text, context: latestAI || conversation})});
    data = await res.json();
    document.getElementById("chat").lastElementChild.remove();
    addAI(data.response || "I'm sorry, I couldn't process that question.");
  } else {
    if(!conversation.symptoms){conversation.symptoms=text;}else{conversation.answers.push(text);conversation.questionIndex+=1;}
    res=await fetch("/ai/personal-check",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(conversation)});
    data=await res.json();
    document.getElementById("chat").lastElementChild.remove();
    if(data.mode==="question"){addAI(data.question);isWaiting=false;return;}
    latestAI=data;
    renderFinal(data);
    generateNote();
    generateFHIR();
  }
  isWaiting=false;
}

// Paste your original renderFinal, generateNote, generateFHIR, submitOverride, showDiagnostics, etc. here (same as last version)

showChat();
</script>
</body>
</html>
