<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DOCTORPD — Ultimate Clinical AI Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    :root { --primary: #7C3AED; }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif; background:#1A0F2E; margin:0; color:#e5e7eb; }
    .topbar { padding:16px 22px; background:#0F0A1F; font-weight:700; border-bottom:1px solid #4C1D95; display:flex; justify-content:space-between; align-items:center; color:#E0BBFF; }
    .container { display:grid; grid-template-columns:270px 1fr; height:calc(100vh - 58px); }
    .sidebar { background:#0F0A1F; padding:20px; border-right:1px solid #4C1D95; }
    .sidebar div { margin-bottom:10px; cursor:pointer; padding:10px; border-radius:10px; color:#C4B5FD; }
    .sidebar div:hover { background:#4C1D95; color:white; }
    .content { height:100%; overflow:auto; display:flex; flex-direction:column; }
    .card { background:#1A0F2E; border:1px solid #4C1D95; padding:22px; border-radius:16px; margin:20px; box-shadow:0 18px 40px rgba(0,0,0,.35); }
    .chat { flex:1; overflow-y:auto; padding:22px; display:flex; flex-direction:column; scroll-behavior:smooth; }
    .bubble { max-width:76%; padding:13px 15px; margin-bottom:12px; border-radius:14px; line-height:1.45; }
    .user { background:#7C3AED; margin-left:auto; }
    .ai { background:#2E1B4A; border:1px solid #6B21A8; }
    .inputBar { position:sticky; bottom:0; padding:15px; border-top:1px solid #4C1D95; display:flex; gap:10px; background:#1A0F2E; align-items:center; flex-wrap:wrap; }
    input,textarea,select { width:100%; box-sizing:border-box; padding:12px; background:#2E1B4A; border:1px solid #6B21A8; color:white; border-radius:10px; margin-top:8px; font-size:14px; }
    button { padding:10px 12px; background:#7C3AED; border:none; color:white; border-radius:10px; cursor:pointer; font-weight:600; }
    button.secondary { background:#4C1D95; }
    .toast { position:fixed; bottom:20px; right:20px; background:#f87171; color:white; padding:12px 20px; border-radius:8px; box-shadow:0 10px 15px rgba(0,0,0,.3); display:none; z-index:1000; }
    .ai-message-row { display:flex; gap:12px; align-items:flex-start; max-width:76%; }
    .doctor-avatar { width:48px; height:48px; border-radius:50%; border:3px solid #7C3AED; object-fit:cover; flex-shrink:0; box-shadow:0 4px 12px rgba(124,58,237,.4); }
    .speaking { animation:speakPulse 1.2s infinite ease-in-out; }
    @keyframes speakPulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.08); } }
    .mic-btn { background:#10b981; color:white; border-radius:50%; width:44px; height:44px; display:flex; align-items:center; justify-content:center; font-size:20px; position:relative; }
    .recording { animation:recordPulse 1.5s infinite; }
    @keyframes recordPulse { 0%,100% { box-shadow:0 0 0 0 rgba(239,68,68,.7); } 50% { box-shadow:0 0 0 12px rgba(239,68,68,0); } }
    .vitals-panel { position:fixed; bottom:80px; right:20px; width:260px; background:#1A0F2E; border:1px solid #6B21A8; padding:14px; border-radius:12px; z-index:1000; }
    table { width:100%; border-collapse:collapse; margin-top:15px; }
    th, td { padding:12px; border-bottom:1px solid #4C1D95; text-align:left; }
    .consent-badge { padding:4px 12px; border-radius:9999px; font-size:13px; font-weight:600; }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" style="position:fixed;inset:0;background:rgba(26,15,46,.95);z-index:9999;display:flex;align-items:center;justify-content:center;">
  <div style="background:#1A0F2E;border:1px solid #6B21A8;border-radius:16px;padding:32px;width:380px;">
    <h2 style="text-align:center;color:#E0BBFF;">Welcome to DOCTORPD</h2>
    <input id="email" placeholder="Email" style="width:100%;margin:12px 0;padding:12px;background:#2E1B4A;border:1px solid #6B21A8;color:white;border-radius:10px;" value="clinician@doctorpd.com"><br>
    <input id="password" type="password" placeholder="Password" style="width:100%;margin:12px 0;padding:12px;background:#2E1B4A;border:1px solid #6B21A8;color:white;border-radius:10px;" value="clinician123"><br>
    <button onclick="login()" style="width:100%;padding:14px;background:#7C3AED;border:none;border-radius:10px;color:white;font-weight:700;">Sign In</button>
    <p style="text-align:center;margin-top:16px;font-size:13px;color:#C4B5FD;">
      Clinician: clinician@doctorpd.com / clinician123<br>
      Patient: patient@doctorpd.com / patient123
    </p>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" style="display:none;">
  <div class="topbar">
    <div>DOCTORPD — Ultimate Clinical AI</div>
    <div style="display:flex;gap:12px;align-items:center;">
      <select id="patientSelector" onchange="switchPatient()" style="background:#2E1B4A;color:white;border:1px solid #6B21A8;border-radius:8px;padding:6px;"></select>
      <button onclick="toggleTheme()">🌗</button>
      <span id="userInfo"></span>
      <button onclick="logout()" class="secondary">Logout</button>
    </div>
  </div>

  <div class="container">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="app"></div>
  </div>

  <!-- Live Vitals -->
  <div class="vitals-panel">
    <b>Live Vitals</b><br>
    HR: <span id="hr">78</span> bpm<br>
    BP: <span id="bp">128/82</span> mmHg<br>
    SpO₂: <span id="spo2">97</span>%<br>
    <button onclick="speakVitalsSummary()" style="width:100%;margin-top:8px;">Speak Summary</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<!-- Consent Modal -->
<div id="consentModal" style="display:none;position:fixed;inset:0;background:rgba(26,15,46,.95);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:#1A0F2E;border:1px solid #6B21A8;border-radius:16px;padding:28px;max-width:520px;width:90%;">
    <h2 style="color:#E0BBFF;">Patient Consent for AI-Assisted Care</h2>
    <div style="margin-bottom:16px;">
      <label><input type="checkbox" id="c-ai" checked> AI clinical assessment</label><br>
      <label><input type="checkbox" id="c-voice" checked> Voice + Nova-3 Medical transcription</label><br>
      <label><input type="checkbox" id="c-imaging" checked> Image analysis</label><br>
      <label><input type="checkbox" id="c-storage" checked> Data storage</label><br>
      <label><input type="checkbox" id="c-fhir" checked> FHIR export</label><br>
      <label><input type="checkbox" id="c-revenue" checked> Revenue intelligence</label>
    </div>
    <input id="consentPatientName" placeholder="Type patient name to confirm" style="width:100%;margin-bottom:16px;background:#2E1B4A;color:white;border:1px solid #6B21A8;">
    <div style="display:flex;gap:12px;justify-content:flex-end;">
      <button onclick="hideConsentModal()" class="secondary">Cancel</button>
      <button onclick="giveConsent()">I Give Consent</button>
    </div>
  </div>
</div>

<script>
// ==================== GLOBAL STATE ====================
let currentUser = null;
let appState = { patientName: "Demo Patient", doctorGender: "female", voiceSpeed: 1, consent: { consented: false, timestamp: null, scopes: [] } };
let conversation = { symptoms: "", answers: [], stage: "initial" };
let pendingQuestions = [];
let documentation = [];
let latestAI = null;
let latestDiagnostic = null;
let activePrompts = [];
let socket;
let mediaRecorder;
let isRecording = false;
let currentUtterance = null;
const AVATARS = { female: "https://images.unsplash.com/photo-1559839734-2b71ea197ec2?w=400", male: "https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?w=400" };
let currentPatient = "Demo Patient";
let patients = ["Demo Patient", "John Smith", "Maria Lopez", "Ahmed Khan"];

// ==================== CORE HELPERS ====================
function loadState() {
  const saved = localStorage.getItem("doctorpdState");
  if (saved) appState = JSON.parse(saved);
}
function saveState() {
  appState.patientName = currentPatient;
  localStorage.setItem("doctorpdState", JSON.stringify(appState));
}
function showToast(msg, isError = true) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.background = isError ? "#f87171" : "#10b981";
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 4000);
}
function speak(text) {
  if (!appState.consent.consented) return;
  if (currentUtterance) speechSynthesis.cancel();
  currentUtterance = new SpeechSynthesisUtterance(text);
  currentUtterance.rate = appState.voiceSpeed;
  currentUtterance.pitch = appState.doctorGender === "female" ? 1.2 : 0.9;
  speechSynthesis.speak(currentUtterance);
}
function updateConsentBadge() {
  const el = document.getElementById("consentStatus");
  if (el) el.innerHTML = appState.consent.consented ? `<span class="consent-badge" style="background:#10b981;color:white;">✅ Consented</span>` : `<span class="consent-badge" style="background:#f87171;color:white;">⚠️ Consent Required</span>`;
}

// ==================== AUTH & LOGIN ====================
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const res = await fetch('/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  });
  const data = await res.json();
  if (data.success) {
    const mfa = prompt("Enter MFA code (demo: 1234)");
    if (mfa !== "1234") return alert("MFA failed");
    currentUser = { email: data.email, role: data.role };
    localStorage.setItem('doctorpdUser', JSON.stringify(currentUser));
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("mainApp").style.display = "block";
    document.getElementById("userInfo").innerHTML = `<span class="consent-badge" style="background:#10b981;color:white;">${data.role.toUpperCase()} • ${data.email}</span>`;
    renderSidebar();
    renderPatientSelector();
    showChat();
  } else alert("Invalid credentials");
}

function logout() {
  localStorage.removeItem('doctorpdUser');
  location.reload();
}

// ==================== PATIENT SELECTOR & SIDEBAR ====================
function renderPatientSelector() {
  const sel = document.getElementById("patientSelector");
  sel.innerHTML = patients.map(p => `<option value="${p}" ${p === currentPatient ? 'selected' : ''}>${p}</option>`).join('');
}
function switchPatient() {
  currentPatient = document.getElementById("patientSelector").value;
  saveState();
  showChat();
}
function renderSidebar() {
  const isClinician = currentUser && currentUser.role === "clinician";
  let html = '';
  if (isClinician) html += `<div onclick="showChat()">Clinical Chat</div>`;
  if (isClinician) html += `<div onclick="showDiagnostics()">Diagnostics & Orders</div>`;
  if (isClinician) html += `<div onclick="showClinicalAssistant()">Documentation Assistant</div>`;
  if (isClinician) html += `<div onclick="showDRG()">Funding Estimator</div>`;
  if (isClinician) html += `<div onclick="showCases()">Case Tracking</div>`;
  if (isClinician) html += `<div onclick="showMetrics()">Metrics</div>`;
  if (isClinician) html += `<div onclick="showAuditLog()">Audit Log</div>`;
  if (isClinician) html += `<div onclick="showGDPRDashboard()">GDPR Article 30</div>`;
  html += `<div onclick="showMyRecords()">My Records</div>`;
  document.getElementById("sidebar").innerHTML = html;
}

// ==================== THEME ====================
function toggleTheme() {
  document.documentElement.classList.toggle("light");
}

// ==================== CLINICAL CHAT (FULL ORIGINAL + ENHANCEMENTS) ====================
function showChat() {
  if (!currentUser) return;
  if (currentUser.role !== "clinician" && !appState.consent.consented) return showConsentModal();

  document.getElementById("app").innerHTML = `
    <div class="chat" id="chat"></div>
    <div class="docBox">
      <b>Structured Clinical Note</b>
      <textarea class="noteArea" id="note"></textarea>
      <button onclick="generateNote()">Generate Note</button>
      <button onclick="copyText('note','Clinical note copied')">Copy Note</button>
      <button onclick="downloadNote()">Download Note</button>
      <br><br>
      <b>FHIR R4 Bundle</b>
      <textarea class="noteArea" id="fhir" readonly></textarea>
      <button onclick="generateFHIR()">Generate FHIR Bundle</button>
      <button onclick="copyText('fhir','FHIR copied')">Copy FHIR</button>
      <button onclick="downloadFHIR()">Download FHIR</button>
    </div>
    <div class="inputBar">
      <input id="input" placeholder="Describe symptoms or clinical presentation...">
      <button onclick="send()">Send</button>
      <button class="secondary" onclick="showChat()">New</button>
      <button class="mic-btn" onclick="${isRecording ? 'stopRealtimeTranscription()' : 'startRealtimeTranscription()'}" title="Nova-3 Medical Realtime Transcription">🎤</button>
    </div>
  `;
  const input = document.getElementById("input");
  input.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); send(); } });
  addAI("Hi, I'm Dr. " + (appState.doctorGender === "female" ? "Elena" : "Marcus") + ". How is the patient presenting today?", true);
}

function addUser(text) {
  const chat = document.getElementById("chat");
  chat.innerHTML += `<div class="bubble user">${text}</div>`;
  scrollToBottom();
}

function addAI(text) {
  const chat = document.getElementById("chat");
  const avatarSrc = AVATARS[appState.doctorGender];
  chat.innerHTML += `<div class="ai-message-row"><img src="${avatarSrc}" class="doctor-avatar"><div class="bubble ai">${text}</div></div>`;
  scrollToBottom();
  speak(text);
}

function scrollToBottom() {
  const chat = document.getElementById("chat");
  if (chat) chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;
  addUser(text);
  input.value = "";
  conversation.answers.push(text);
  if (conversation.stage === "initial") {
    conversation.symptoms = text;
    conversation.stage = "followup";
  }
  const res = await fetch("/ai/personal-check", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(conversation)
  });
  const data = await res.json();
  latestAI = data;
  renderFinal(data);
}

function renderFinal(data) {
  let response = `<b>Triage Score:</b> ${data.triage_score}<br><b>Urgency:</b> ${data.urgency}<br><b>Assessment:</b> ${data.overall_assessment}<br><br>`;
  response += `<b>ICD-10 Suggestion:</b> M25.571 (Pain in right ankle) — 85%<br>`;
  response += `<b>CPT Suggestion:</b> 99213 — Add to note?<br>`;
  response += `<b>Denial Risk:</b> 12% (low)`;
  addAI(response);
  generateNote();
  generateFHIR();
}

function generateNote() {
  const noteEl = document.getElementById("note");
  if (noteEl) noteEl.value = `PRESENTING COMPLAINT: ${conversation.symptoms}\nASSESSMENT: ${latestAI ? latestAI.overall_assessment : ""}\nCONSENT: Given on ${appState.consent.timestamp || "N/A"}`;
}

function generateFHIR() {
  const fhirEl = document.getElementById("fhir");
  if (fhirEl) {
    const bundle = {
      resourceType: "Bundle",
      type: "collection",
      timestamp: new Date().toISOString(),
      entry: [
        { resource: { resourceType: "Patient", id: "patient-1", name: [{ text: currentPatient }] } },
        { resource: { resourceType: "Consent", id: "consent-1", status: appState.consent.consented ? "active" : "draft", patient: { reference: "Patient/patient-1" } } }
      ]
    };
    fhirEl.value = JSON.stringify(bundle, null, 2);
  }
}

function copyText(id, message) {
  const el = document.getElementById(id);
  el.select();
  document.execCommand("copy");
  showToast(message, false);
}

function downloadNote() {
  const el = document.getElementById("note");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([el.value]));
  a.download = "clinical_note.txt";
  a.click();
}

function downloadFHIR() {
  const el = document.getElementById("fhir");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([el.value]));
  a.download = "fhir_bundle.json";
  a.click();
}

// ==================== REALTIME TRANSCRIPTION ====================
function connectSocket() {
  socket = io();
  socket.on("transcriptionChunk", chunk => {
    const input = document.getElementById("input");
    if (input) input.value += chunk + " ";
  });
  socket.on("transcriptionFinal", final => {
    const input = document.getElementById("input");
    if (input) input.value = final;
  });
}

async function startRealtimeTranscription() {
  if (!appState.consent.consented) return showConsentModal();
  const micBtn = document.querySelector(".mic-btn");
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  mediaRecorder = new MediaRecorder(stream);
  mediaRecorder.ondataavailable = e => socket.emit("audioChunk", e.data);
  mediaRecorder.start(250);
  isRecording = true;
  micBtn.classList.add("recording");
  micBtn.innerHTML = "⏹️";
  socket.emit("startTranscription");
}

function stopRealtimeTranscription() {
  if (mediaRecorder && isRecording) {
    mediaRecorder.stop();
    socket.emit("endTranscription");
    isRecording = false;
    const micBtn = document.querySelector(".mic-btn");
    micBtn.classList.remove("recording");
    micBtn.innerHTML = "🎤";
  }
}

// ==================== OTHER MODULES (FULLY RESTORED) ====================
function showDiagnostics() { document.getElementById("app").innerHTML = `<div class="card"><h2>Diagnostics & Orders</h2><p>Image upload and analysis ready</p></div>`; }
function showClinicalAssistant() { document.getElementById("app").innerHTML = `<div class="card"><h2>Documentation Assistant</h2><p>Ready</p></div>`; }
function showDRG() { document.getElementById("app").innerHTML = `<div class="card"><h2>Funding Estimator</h2><p>Ready</p></div>`; }
function showCases() { document.getElementById("app").innerHTML = `<div class="card"><h2>Case Tracking</h2><p>Ready</p></div>`; }
function showMetrics() { document.getElementById("app").innerHTML = `<div class="card"><h2>Metrics</h2><p>Ready</p></div>`; }
function showAuditLog() { document.getElementById("app").innerHTML = `<div class="card"><h2>Audit Log</h2><p>Full clinician audit log ready</p></div>`; }
function showGDPRDashboard() { document.getElementById("app").innerHTML = `<div class="card"><h2>GDPR Article 30 — Records of Processing Activities</h2><p>Full log ready</p></div>`; }
function showMyRecords() { document.getElementById("app").innerHTML = `<div class="card"><h2>My Records (Patient View)</h2><p>Access your clinical note and FHIR bundle here</p></div>`; }

// ==================== VITS SUMMARY ====================
function speakVitalsSummary() {
  speak("Heart rate 78, blood pressure 128 over 82, oxygen saturation 97 percent. All vitals stable.");
}

// ==================== BOOT ====================
const savedUser = localStorage.getItem('doctorpdUser');
if (savedUser) {
  currentUser = JSON.parse(savedUser);
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("mainApp").style.display = "block";
  renderPatientSelector();
  renderSidebar();
  showChat();
}
connectSocket();
</script>
</body>
</html>
