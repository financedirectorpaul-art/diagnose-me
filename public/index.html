<!DOCTYPE html>
<html>
<head>
  <title>Diagnose Me Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body{font-family:Arial;background:#0b0720;color:#fff;margin:0}
    .topbar{padding:15px;background:#120d2f;display:flex;justify-content:space-between}
    .container{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 60px)}
    .sidebar{background:#120d2f;padding:15px}
    .sidebar div{margin-bottom:10px;cursor:pointer}
    .content{padding:20px}
    .card{background:#fff;color:#111;padding:20px;border-radius:12px;margin-bottom:20px}
    textarea,input{width:100%;margin-top:10px;padding:10px}
    button{margin-top:10px;padding:10px;background:#6d28d9;color:#fff;border:none}
    .suggestion{background:#f3f0ff;padding:10px;margin-top:10px;border-radius:10px}
    .metric{background:#111;color:#fff;padding:10px;margin-top:10px;border-radius:10px}
  </style>
</head>

<body>

<div class="topbar">
  <div><b>Diagnose Me Platform</b></div>
  <div id="pilotStatus"></div>
</div>

<div class="container">

  <div class="sidebar">
    <div onclick="togglePilot()">Pilot Mode</div>
    <div onclick="showHome()">Home</div>
    <div onclick="showPersonal()">Personal Health Check</div>
    <div onclick="showDRG()">DRG Engine</div>
    <div onclick="showMetrics()">Pilot Metrics</div>
    <div onclick="showCases()">Case Tracking</div>
  </div>

  <div class="content" id="app"></div>

</div>

<script>

// ================= STATE =================

let pilot = localStorage.getItem("pilot") === "true";
updatePilot();

// ================= PILOT =================

function togglePilot(){
  pilot = !pilot;
  localStorage.setItem("pilot", pilot);
  updatePilot();
}

function updatePilot(){
  document.getElementById("pilotStatus").innerText =
    "Pilot Mode: " + (pilot ? "ON" : "OFF");
}

// ================= HOME =================

function showHome(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Hospital Revenue Platform</h2>
      <p>Track predicted vs actual funding and identify variance.</p>
    </div>
  `;
}

// ================= PERSONAL =================

function showPersonal(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Personal Health Check</h2>
      <textarea id="symptom"></textarea>
      <button onclick="runAI()">Analyse</button>
      <div id="out"></div>
    </div>
  `;
}

async function runAI(){
  const input = document.getElementById("symptom").value;

  const res = await fetch("/ai/personal-check", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ symptoms: input })
  });

  const data = await res.json();

  document.getElementById("out").innerHTML = `
    <div class="suggestion">${data.reasoning || data.output}</div>
  `;
}

// ================= DRG =================

function showDRG(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>DRG Engine</h2>
      <input id="dx" placeholder="Diagnosis">
      <button onclick="estimateDRG()">Estimate</button>
      <div id="drgOut"></div>
    </div>
  `;
}

async function estimateDRG(){

  const diagnosis = document.getElementById("dx").value;

  const res = await fetch("/drg/estimate", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ diagnosis })
  });

  const data = await res.json();

  document.getElementById("drgOut").innerHTML = `
    <div class="metric">Predicted Funding: $${data.funding}</div>

    <input id="actual" placeholder="Enter actual funding">

    <button onclick="saveCase(${data.funding})">Save Case</button>
  `;
}

// ================= SAVE CASE =================

async function saveCase(predicted){

  const actual = Number(document.getElementById("actual").value || 0);

  await fetch("/pilot/track", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      predicted,
      actual
    })
  });

  alert("Case saved");

}

// ================= METRICS =================

async function showMetrics(){

  const res = await fetch("/pilot/metrics");
  const data = await res.json();

  const avgVariance = data.total
    ? Math.round(data.delta / data.total)
    : 0;

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Pilot Metrics</h2>
      <div class="metric">Predicted: $${data.predicted}</div>
      <div class="metric">Actual: $${data.actual}</div>
      <div class="metric">Total Variance: $${data.delta}</div>
      <div class="metric">Avg Variance per Case: $${avgVariance}</div>
      <div class="metric">Cases: ${data.total}</div>
    </div>
  `;
}

// ================= CASE VIEW =================

async function showCases(){

  const res = await fetch("/pilot/metrics");
  const data = await res.json();

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Case Tracking</h2>
      <p>Use Supabase table for detailed case-level review.</p>
    </div>
  `;
}

// ================= INIT =================

showHome();

</script>

</body>
</html>
