<!DOCTYPE html>
<html>
<head>
<title>Diagnose Me</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";background:#0f172a;margin:0;color:#e5e7eb}

.container{
  display:grid;
  grid-template-columns:260px 1fr;
  height:100vh;
}

.sidebar{
  background:#020617;
  padding:20px;
  border-right:1px solid #1e293b;
}

.sidebar div{
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  cursor:pointer;
}

.sidebar div:hover{background:#1e293b}

.main{
  display:flex;
  flex-direction:column;
  height:100vh;
}

.chat{
  flex:1;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  scroll-behavior:smooth;
}

.bubble{
  padding:12px;
  margin:8px;
  border-radius:10px;
  max-width:70%;
  animation:fadeIn .2s ease;
}

.user{background:#7c3aed;margin-left:auto}
.ai{background:#1e293b}

.inputBar{
  position:sticky;
  bottom:0;
  background:#020617;
  padding:15px;
  border-top:1px solid #1e293b;
  display:flex;
  gap:10px;
}

input,textarea{
  width:100%;
  padding:10px;
  background:#020617;
  color:white;
  border:1px solid #334155;
}

button{
  padding:10px;
  background:#7c3aed;
  border:none;
  color:white;
  cursor:pointer;
}

.clickable{
  color:#a78bfa;
  cursor:pointer;
}

.typing{
  font-style:italic;
  opacity:0.7;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(5px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
  <div onclick="showChat()">Clinical Chat</div>
  <div onclick="showDiagnostics()">Diagnostics</div>
  <div onclick="showDocs()">Documentation Assistant</div>
  <div onclick="showDRG()">DRG Engine</div>
  <div onclick="showCases()">Case Tracking</div>
  <div onclick="showMetrics()">Metrics</div>
</div>

<div id="main" class="main"></div>

</div>

<script>

// ================= STATE =================
let conversation={symptoms:"",answers:[],stage:"initial"};
let pendingQuestions=[];
let documentation=[];
let latestAI=null;
let typingEl=null;

// ================= SCROLL =================
function scrollToBottom(){
  const chat=document.getElementById("chat");
  if(chat) chat.scrollTop=chat.scrollHeight;
}

// ================= CHAT =================

function showChat(){
document.getElementById("main").innerHTML=`

<div id="chat" class="chat"></div>

<div class="inputBar">
  <input id="input" placeholder="Describe symptoms...">
  <button onclick="send()">Send</button>
</div>

<textarea id="note"></textarea>
<button onclick="downloadNote()">Download Note</button>
<button onclick="newConsult()">New Consultation</button>
`;

const input=document.getElementById("input");

// ENTER TO SEND
input.addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    e.preventDefault();
    send();
  }
});

addAI("Start a consultation — tell me your symptoms.");
}

// ================= UI =================

function addUser(t){
const chat=document.getElementById("chat");
chat.innerHTML+=`<div class="bubble user">${t}</div>`;
scrollToBottom();
}

function addAI(t){
const chat=document.getElementById("chat");
chat.innerHTML+=`<div class="bubble ai">${t}</div>`;
scrollToBottom();
}

// ================= TYPING =================

function showTyping(){
const chat=document.getElementById("chat");
typingEl=document.createElement("div");
typingEl.className="bubble ai typing";
typingEl.innerText="Typing...";
chat.appendChild(typingEl);
scrollToBottom();
}

function removeTyping(){
if(typingEl){
typingEl.remove();
typingEl=null;
}
}

// ================= SEND =================

async function send(){

const input=document.getElementById("input");
const text=input.value.trim();

if(!text) return;

addUser(text);
input.value="";

showTyping();

if(conversation.stage==="initial"){
conversation.symptoms=text;
conversation.stage="followup";
await askAI(false);
return;
}

if(conversation.stage==="followup"){
conversation.answers.push(text);

if(pendingQuestions.length>0) pendingQuestions.shift();

if(pendingQuestions.length>0){
removeTyping();
addAI(pendingQuestions[0]);
return;
}

conversation.stage="final";
await askAI(true);
}

}

// ================= AI =================

async function askAI(finalMode){

const res=await fetch("/ai/personal-check",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify(conversation)
});

const data=await res.json();
latestAI=data;

removeTyping();

if(!finalMode && data.follow_up_questions?.length){
pendingQuestions=data.follow_up_questions;
addAI(pendingQuestions[0]);
return;
}

renderFinal(data);
}

// ================= FINAL =================

function renderFinal(data){

let out=`<b>${data.overall_assessment}</b><br><br>`;

if(data.conditions){
data.conditions.forEach(c=>{
out+=`• ${c.name} (${c.likelihood})<br>`;
});
}

if(data.revenue_prompts){
out+=`<br><b>Documentation</b><br>`;
data.revenue_prompts.forEach(p=>{
out+=`<span class="clickable" onclick="addDoc('${p.message}')">${p.message}</span><br>`;
});
}

addAI(out);
}

// ================= DOC =================

function addDoc(t){
documentation.push(t);
document.getElementById("note").value=documentation.join("\n");
}

function downloadNote(){
const blob=new Blob([document.getElementById("note").value]);
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="note.txt";
a.click();
}

function newConsult(){
conversation={symptoms:"",answers:[],stage:"initial"};
pendingQuestions=[];
document.getElementById("chat").innerHTML="";
addAI("New consultation started.");
}

// ================= OTHER MODULES (UNCHANGED) =================

function showDiagnostics(){
document.getElementById("main").innerHTML=`Diagnostics module`;
}

function showDocs(){
document.getElementById("main").innerHTML=`Documentation assistant`;
}

function showDRG(){
document.getElementById("main").innerHTML=`DRG engine`;
}

function showCases(){
document.getElementById("main").innerHTML=`Case tracking`;
}

function showMetrics(){
document.getElementById("main").innerHTML=`Metrics`;
}

showChat();

</script>

</body>
</html>
