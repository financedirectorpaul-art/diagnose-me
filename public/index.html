<!DOCTYPE html>
<html>
<head>
  <title>Diagnose Me</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body{font-family:Arial;background:#0f172a;margin:0;color:#e5e7eb}
    .topbar{padding:15px;background:#020617}
    .container{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 60px)}
    .sidebar{background:#020617;padding:20px}
    .sidebar div{margin-bottom:10px;cursor:pointer}
    .content{padding:20px}
    .card{background:#020617;padding:20px;border-radius:12px;margin-bottom:20px}
    textarea,input{width:100%;padding:10px;margin-top:10px;background:#0f172a;color:white;border:1px solid #334155}
    button{margin-top:10px;padding:10px;background:#7c3aed;color:white;border:none}
    .box{background:#1e293b;padding:10px;margin-top:10px;border-radius:8px}
  </style>
</head>

<body>

<div class="topbar">Diagnose Me Platform</div>

<div class="container">

<div class="sidebar">
  <div onclick="showHome()">Home</div>
  <div onclick="showPersonal()">Clinical AI</div>
  <div onclick="showClinical()">Clinical Assistant</div>
  <div onclick="showDRG()">DRG Engine</div>
  <div onclick="showCases()">Cases</div>
  <div onclick="showMetrics()">Metrics</div>
</div>

<div class="content" id="app"></div>

</div>

<script>

let conversation = { symptoms:"", answers:[] };

function showHome(){
  document.getElementById("app").innerHTML = `<div class="card">Platform Ready</div>`;
}

// ================= PERSONAL =================

function showPersonal(){
  conversation = { symptoms:"", answers:[] };

  document.getElementById("app").innerHTML = `
    <div class="card">
      <textarea id="symptom"></textarea>
      <button onclick="start()">Start</button>
      <div id="out"></div>
    </div>
  `;
}

async function start(){
  conversation.symptoms = document.getElementById("symptom").value;
  callAI();
}

async function callAI(){
  const res = await fetch("/ai/personal-check", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(conversation)
  });

  const data = await res.json();

  document.getElementById("out").innerHTML = `
    ${(data.conditions||[]).map(c=>`
      <div class="box">
        ${c.name} (${c.likelihood})<br>${c.reason}
      </div>
    `).join("")}

    ${(data.follow_up_questions||[]).map((q,i)=>`
      <div class="box">
        ${q}
        <input id="q${i}">
      </div>
    `).join("")}

    ${(data.follow_up_questions||[]).length ? `
      <button onclick="submit(${data.follow_up_questions.length})">Continue</button>
    ` : ""}
  `;
}

function submit(n){
  for(let i=0;i<n;i++){
    let v=document.getElementById("q"+i).value;
    if(v) conversation.answers.push(v);
  }
  callAI();
}

// ================= CLINICAL =================

function showClinical(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <textarea id="note"></textarea>
      <button onclick="analyse()">Analyse</button>
      <div id="suggestions"></div>
    </div>
  `;
}

async function analyse(){
  const note = document.getElementById("note").value;

  const res = await fetch("/ai/clinical-assist",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ note })
  });

  const data = await res.json();

  document.getElementById("suggestions").innerHTML =
    (data.suggestions||[]).map(s=>`<div class="box">${s}</div>`).join("");
}

// ================= DRG =================

function showDRG(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <input id="dx">
      <button onclick="runDRG()">Run</button>
      <div id="out"></div>
    </div>
  `;
}

async function runDRG(){
  const dx=document.getElementById("dx").value;

  const res=await fetch("/drg/estimate",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ diagnosis: dx })
  });

  const data=await res.json();

  document.getElementById("out").innerHTML=`
    ${data.funding}
    <input id="actual">
    <button onclick="save(${data.funding})">Save</button>
  `;
}

async function save(predicted){
  const actual=Number(document.getElementById("actual").value||0);

  await fetch("/pilot/track",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ predicted, actual })
  });

  alert("Saved");
}

// ================= CASES =================

async function showCases(){
  const res=await fetch("/pilot/data");
  const data=await res.json();

  document.getElementById("app").innerHTML =
    data.map(r=>`<div class="box">${r.predicted} vs ${r.actual}</div>`).join("");
}

// ================= METRICS =================

async function showMetrics(){
  const res=await fetch("/pilot/metrics");
  const d=await res.json();

  document.getElementById("app").innerHTML = `
    <div class="card">
      ${d.predicted} / ${d.actual} / ${d.delta}
    </div>
  `;
}

showHome();

</script>

</body>
</html>
