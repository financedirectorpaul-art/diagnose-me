<!DOCTYPE html>
<html>
<head>
  <title>Diagnose Me Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body{font-family:Arial;background:#0b0720;color:#fff;margin:0}
    .topbar{padding:15px;background:#120d2f;display:flex;justify-content:space-between}
    .container{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 60px)}
    .sidebar{background:#120d2f;padding:15px}
    .sidebar div{margin-bottom:10px;cursor:pointer}
    .content{padding:20px}
    .card{background:#fff;color:#111;padding:20px;border-radius:12px;margin-bottom:20px}
    textarea,input{width:100%;margin-top:10px;padding:10px}
    button{margin-top:10px;padding:10px;background:#6d28d9;color:#fff;border:none}
    .suggestion{background:#f3f0ff;padding:10px;margin-top:10px;border-radius:10px}
    .metric{background:#111;color:#fff;padding:10px;margin-top:10px;border-radius:10px}
    .pill{padding:5px 10px;border-radius:10px;color:#fff}
    .HIGH{background:#dc2626}.MEDIUM{background:#d97706}.LOW{background:#16a34a}
    .error{color:red;margin-top:10px}
  </style>
</head>

<body>

<div class="topbar">
  <div><b>Diagnose Me Platform</b></div>
  <div id="pilotStatus"></div>
</div>

<div class="container">

  <div class="sidebar">
    <div onclick="togglePilot()">Pilot Mode</div>

    <div onclick="showHome()">Home</div>
    <div onclick="showPersonal()">Personal Health Check</div>
    <div onclick="showClinical()">Clinical Assistant</div>
    <div onclick="showDRG()">DRG Engine</div>
    <div onclick="showMetrics()">Pilot Metrics</div>
    <div onclick="showExecutive()">Executive Dashboard</div>
  </div>

  <div class="content" id="app"></div>

</div>

<script>

// ================= STATE =================

let pilot = localStorage.getItem("pilot") === "true";
let conversation = { symptoms:"", answers:[] };

updatePilot();

// ================= PILOT =================

function togglePilot(){
  pilot = !pilot;
  localStorage.setItem("pilot", pilot);
  updatePilot();
}

function updatePilot(){
  document.getElementById("pilotStatus").innerText =
    "Pilot Mode: " + (pilot ? "ON" : "OFF");
}

// ================= HOME =================

function showHome(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Platform Overview</h2>
      <p>This system combines:</p>
      <ul>
        <li>AI Personal Health Assessment</li>
        <li>Clinical Documentation Intelligence</li>
        <li>Hospital Funding Optimisation</li>
      </ul>
    </div>
  `;
}

// ================= PERSONAL =================

function showPersonal(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Personal Health Check</h2>
      <textarea id="symptom"></textarea>
      <button onclick="startAssessment()">Start Assessment</button>
      <div id="out"></div>
    </div>
  `;
}

async function startAssessment(){
  const input = document.getElementById("symptom").value;

  conversation = { symptoms: input, answers: [] };

  const res = await fetch("/ai/personal-check", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(conversation)
  });

  const data = await res.json();

  document.getElementById("out").innerHTML = `
    <div class="suggestion"><b>Causes:</b><br>${(data.causes||[]).join("<br>")}</div>
    <div class="suggestion"><b>Reasoning:</b><br>${data.reasoning||data.output||""}</div>
    <div class="suggestion"><b>Urgency:</b> ${data.urgency||"LOW"}</div>
  `;
}

// ================= CLINICAL =================

function showClinical(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Clinical Documentation Assistant</h2>
      <textarea id="note"></textarea>
      <button onclick="runClinical()">Analyse</button>
      <div id="suggestions"></div>
    </div>
  `;
}

async function runClinical(){
  const note = document.getElementById("note").value;

  const res = await fetch("/ai/clinical-assist", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ note })
  });

  const data = await res.json();

  document.getElementById("suggestions").innerHTML =
    (data.suggestions||[]).map(s=>`<div class="suggestion">${s}</div>`).join("");
}

// ================= DRG =================

function showDRG(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>DRG Engine</h2>
      <input id="dx" placeholder="Diagnosis">
      <button onclick="runDRG()">Estimate</button>
      <div id="drgOut"></div>
    </div>
  `;
}

async function runDRG(){
  const diagnosis = document.getElementById("dx").value;

  const res = await fetch("/drg/estimate", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ diagnosis })
  });

  const data = await res.json();

  document.getElementById("drgOut").innerHTML = `
    <div class="metric">DRG: ${data.drg}</div>
    <div class="metric">Weight: ${data.weight}</div>
    <div class="metric">Funding: $${data.funding}</div>
  `;

  // Track
  if(pilot){
    await fetch("/pilot/track", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ predicted:data.funding, actual:0 })
    });
  }
}

// ================= METRICS =================

async function showMetrics(){
  const res = await fetch("/pilot/metrics");
  const data = await res.json();

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Pilot Metrics</h2>
      <div class="metric">Predicted: $${data.predicted}</div>
      <div class="metric">Actual: $${data.actual}</div>
      <div class="metric">Delta: $${data.delta}</div>
      <div class="metric">Episodes: ${data.total}</div>
    </div>
  `;
}

// ================= EXEC =================

async function showExecutive(){
  const res = await fetch("/pilot/metrics");
  const data = await res.json();

  const roi = data.predicted ? Math.round((data.delta/data.predicted)*100) : 0;

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Executive Dashboard</h2>
      <div class="metric">Revenue Impact: $${data.delta}</div>
      <div class="metric">ROI: ${roi}%</div>
    </div>
  `;
}

// ================= INIT =================

showHome();

</script>

</body>
</html>
