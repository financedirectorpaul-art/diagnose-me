<!DOCTYPE html>
<html>
<head>
  <title>Diagnose Me</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body{font-family:-apple-system;background:#0f172a;margin:0;color:#e5e7eb}
    .topbar{padding:16px;background:#020617;border-bottom:1px solid #1e293b}
    .container{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 60px)}
    .sidebar{background:#020617;padding:20px;border-right:1px solid #1e293b}
    .sidebar div{margin-bottom:10px;padding:10px;border-radius:8px;cursor:pointer}
    .sidebar div:hover{background:#1e293b}
    .content{padding:30px}
    .card{background:#020617;border:1px solid #1e293b;padding:20px;border-radius:12px;margin-bottom:20px}
    textarea,input{width:100%;padding:12px;margin-top:10px;background:#0f172a;border:1px solid #334155;color:white;border-radius:8px}
    button{margin-top:12px;padding:12px;background:#7c3aed;border:none;border-radius:8px;color:white}
    .box{background:#0f172a;border:1px solid #334155;padding:10px;border-radius:10px;margin-top:10px}
  </style>
</head>

<body>

<div class="topbar"><b>Diagnose Me Platform</b></div>

<div class="container">

  <div class="sidebar">
    <div onclick="showHome()">Dashboard</div>
    <div onclick="showPersonal()">Clinical AI</div>
    <div onclick="showClinical()">Clinical Assistant</div>
    <div onclick="showDRG()">DRG Engine</div>
    <div onclick="showCases()">Case Analytics</div>
    <div onclick="showMetrics()">Executive View</div>
  </div>

  <div class="content" id="app"></div>

</div>

<script>

// ================= HOME =================

function showHome(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Platform Overview</h2>
      <p>Clinical AI + Hospital Revenue Intelligence</p>
    </div>
  `;
}

// ================= PERSONAL =================

function showPersonal(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Clinical AI Diagnosis</h2>
      <textarea id="symptom"></textarea>
      <button onclick="runAI()">Analyse</button>
      <div id="out"></div>
    </div>
  `;
}

async function runAI(){
  const input = document.getElementById("symptom").value;

  const res = await fetch("/ai/personal-check",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ symptoms: input })
  });

  const data = await res.json();

  document.getElementById("out").innerHTML = `
    ${(data.conditions||[]).map(c=>`
      <div class="box">
        <b>${c.name}</b><br>
        ${c.likelihood}<br>
        ${c.reason}
      </div>
    `).join("")}
  `;
}

// ================= CLINICAL ASSISTANT =================

function showClinical(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Clinical Documentation Assistant</h2>
      <textarea id="note" placeholder="Paste clinical notes..."></textarea>
      <button onclick="analyseNote()">Analyse Documentation</button>
      <div id="suggestions"></div>
    </div>
  `;
}

async function analyseNote(){

  const note = document.getElementById("note").value;

  const res = await fetch("/ai/clinical-assist", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ note })
  });

  const data = await res.json();

  document.getElementById("suggestions").innerHTML =
    (data.suggestions||[]).map(s=>`
      <div class="box">${s}</div>
    `).join("");
}

// ================= DRG =================

function showDRG(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>DRG Engine</h2>
      <input id="dx">
      <button onclick="runDRG()">Estimate</button>
      <div id="drgOut"></div>
    </div>
  `;
}

async function runDRG(){
  const dx = document.getElementById("dx").value;

  const res = await fetch("/drg/estimate",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ diagnosis: dx })
  });

  const data = await res.json();

  document.getElementById("drgOut").innerHTML = `
    <div class="box">
      Predicted: $${data.funding}
      <input id="actual">
      <button onclick="saveCase(${data.funding})">Save</button>
    </div>
  `;
}

async function saveCase(predicted){
  const actual = Number(document.getElementById("actual").value||0);

  await fetch("/pilot/track",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ predicted, actual })
  });

  alert("Saved");
}

// ================= CASES =================

async function showCases(){
  const res = await fetch("/pilot/data");
  const data = await res.json();

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Case Analytics</h2>
      ${data.map(r=>`
        <div class="box">
          $${r.predicted} vs $${r.actual} → ${r.actual - r.predicted}
        </div>
      `).join("")}
    </div>
  `;
}

// ================= METRICS =================

async function showMetrics(){
  const res = await fetch("/pilot/metrics");
  const d = await res.json();

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Executive View</h2>
      Predicted: $${d.predicted}<br>
      Actual: $${d.actual}<br>
      Variance: $${d.delta}
    </div>
  `;
}

// ================= INIT =================

showHome();

</script>

</body>
</html>
