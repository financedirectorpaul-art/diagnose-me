<!DOCTYPE html>
<html>
<head>
  <title>Diagnose Me Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#0f172a;margin:0;color:#e5e7eb}
    .topbar{padding:16px 22px;background:#020617;font-weight:700;border-bottom:1px solid #1e293b}
    .container{display:grid;grid-template-columns:270px 1fr;height:calc(100vh - 58px)}
    .sidebar{background:#020617;padding:20px;border-right:1px solid #1e293b}
    .sidebar div{margin-bottom:10px;cursor:pointer;padding:10px;border-radius:10px;color:#cbd5e1}
    .sidebar div:hover{background:#1e293b;color:white}
    .content{height:100%;overflow:auto;display:flex;flex-direction:column}
    .card{background:#020617;border:1px solid #1e293b;padding:22px;border-radius:16px;margin:20px}
    .chat{flex:1;overflow-y:auto;padding:22px}
    .bubble{max-width:76%;padding:13px 15px;margin-bottom:12px;border-radius:14px;line-height:1.45}
    .user{background:#7c3aed;margin-left:auto}
    .ai{background:#1e293b;border:1px solid #334155}
    .inputBar{padding:15px;border-top:1px solid #1e293b;display:flex;gap:10px;background:#020617}
    input,textarea{width:100%;box-sizing:border-box;padding:12px;background:#020617;border:1px solid #334155;color:white;border-radius:10px;margin-top:8px}
    textarea{min-height:120px}
    .noteArea{height:150px}
    button{padding:10px 12px;background:#7c3aed;border:none;color:white;border-radius:10px;margin-top:8px;cursor:pointer;font-weight:600}
    .box{background:#1e293b;padding:13px;margin-top:10px;border-radius:12px;border:1px solid #334155}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .metric{background:#1e293b;border:1px solid #334155;padding:16px;border-radius:14px}
    .metric b{font-size:22px;display:block;margin-top:4px}
    table{width:100%;border-collapse:collapse;margin-top:15px;font-size:14px}
    th,td{padding:10px;border-bottom:1px solid #334155;text-align:left}
    th{color:#c4b5fd}
    .clickable{color:#c4b5fd;cursor:pointer;text-decoration:underline}
    .docBox{background:#020617;border-top:1px solid #1e293b;padding:14px}
    .preview{max-width:300px;border-radius:12px;border:1px solid #334155;margin-top:10px;display:block}
    .danger{color:#f87171;font-weight:bold}
    .muted{color:#94a3b8;font-size:14px}
  </style>
</head>

<body>

<div class="topbar">Diagnose Me Platform</div>

<div class="container">
  <div class="sidebar">
    <div onclick="showChat()">Clinical Chat</div>
    <div onclick="showDiagnostics()">Diagnostics & Orders</div>
    <div onclick="showClinicalAssistant()">Documentation Assistant</div>
    <div onclick="showDRG()">Funding Estimator</div>
    <div onclick="showCases()">Case Tracking</div>
    <div onclick="showMetrics()">Metrics</div>
  </div>

  <div class="content" id="app"></div>
</div>

<script>
let conversation = { symptoms:"", answers:[], stage:"initial" };
let pendingQuestions = [];
let documentation = [];
let latestAI = null;
let latestDiagnostic = null;
let activePrompts = [];

function safeMoney(n){ return "$" + Number(n || 0).toLocaleString(); }

function showChat(){
  conversation = { symptoms:"", answers:[], stage:"initial" };
  pendingQuestions = [];

  document.getElementById("app").innerHTML = `
    <div class="chat" id="chat"></div>

    <div class="docBox">
      <b>Structured Clinical Note</b>
      <textarea class="noteArea" id="note"></textarea>
      <button onclick="generateNote()">Generate Note</button>
      <button onclick="downloadNote()">Download Note</button>

      <br><br>
      <b>FHIR / EMR-ready JSON</b>
      <textarea class="noteArea" id="fhir"></textarea>
      <button onclick="generateFHIR()">Generate FHIR</button>
      <button onclick="downloadFHIR()">Download FHIR JSON</button>
    </div>

    <div class="inputBar">
      <input id="input" placeholder="Describe symptoms or clinical presentation...">
      <button onclick="send()">Send</button>
      <button onclick="showChat()">New</button>
    </div>
  `;

  addAI("Start a consultation — tell me the symptoms or clinical presentation.");
}

function addUser(text){
  const chat = document.getElementById("chat");
  chat.innerHTML += '<div class="bubble user">' + text + '</div>';
  chat.scrollTop = chat.scrollHeight;
}

function addAI(text){
  const chat = document.getElementById("chat");
  chat.innerHTML += '<div class="bubble ai">' + text + '</div>';
  chat.scrollTop = chat.scrollHeight;
}

async function send(){
  const input = document.getElementById("input");
  const text = input.value.trim();
  if(!text) return;

  addUser(text);
  input.value = "";

  if(conversation.stage === "initial"){
    conversation.symptoms = text;
    conversation.stage = "followup";
    await askAI(false);
    return;
  }

  if(conversation.stage === "followup"){
    conversation.answers.push(text);

    if(pendingQuestions.length > 0){
      pendingQuestions.shift();
    }

    if(pendingQuestions.length > 0){
      addAI(pendingQuestions[0]);
      return;
    }

    conversation.stage = "final";
    await askAI(true);
  }
}

async function askAI(finalMode){
  addAI("Thinking...");

  const res = await fetch("/ai/personal-check", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(conversation)
  });

  const data = await res.json();
  latestAI = data;

  const chat = document.getElementById("chat");
  chat.lastChild.remove();

  if(!finalMode && data.follow_up_questions && data.follow_up_questions.length){
    pendingQuestions = data.follow_up_questions;
    addAI(pendingQuestions[0]);
    return;
  }

  renderFinal(data);
}

function renderFinal(data){
  let response = "";
  activePrompts = data.revenue_prompts || [];

  if(data.red_flags && data.red_flags.length){
    response += '<span class="danger">⚠️ Red Flags</span><br>';
    data.red_flags.forEach(function(r){ response += "• " + r + "<br>"; });
    response += "<br>";
  }

  response += "<b>Triage Score:</b> " + (data.triage_score ?? "Not recorded") + "/100<br>";
  response += "<b>Urgency:</b> " + (data.urgency || "Not recorded") + "<br><br>";

  if(data.conditions && data.conditions.length){
    response += "<b>Possible Conditions</b><br>";
    data.conditions.forEach(function(c){
      response += "• " + c.name + " (" + c.likelihood + ") — " + c.reason + "<br>";
    });
  }

  response += "<br><b>Assessment</b><br>" + (data.overall_assessment || "");

  if(activePrompts.length){
    response += "<br><br><b>Documentation Opportunities</b><br>";
    activePrompts.forEach(function(p, i){
      response += '<span class="clickable" onclick="addPromptToDoc(' + i + ')">• ' + p.message + " → " + safeMoney(p.value) + "</span><br>";
    });
  }

  if(data.funding){
    response += "<br><br><b>Funding Insight</b><br>";
    response += "Baseline: " + safeMoney(data.funding.baseline) + "<br>";
    response += "Potential: " + safeMoney(data.funding.potential) + "<br>";
    response += "Uplift: " + safeMoney(data.funding.uplift);
  }

  if(data.advice){
    response += "<br><br><b>Advice</b><br>" + data.advice;
  }

  addAI(response);
  generateNote();
  generateFHIR();
}

function addPromptToDoc(index){
  const prompt = activePrompts[index];
  if(!prompt) return;
  documentation.push(prompt.message + " → " + safeMoney(prompt.value));
  generateNote();
  generateFHIR();
}

function generateNote(){
  const diagSummary = latestDiagnostic ? `
DIAGNOSTIC PATHWAY:
Image assessment: ${latestDiagnostic.image_assessment || "Not recorded"}
Recommended imaging: ${(latestDiagnostic.recommended_diagnostics?.imaging || []).map(x => `${x.test} - ${x.reason}`).join("; ")}
Recommended pathology: ${(latestDiagnostic.recommended_diagnostics?.pathology || []).map(x => `${x.test} - ${x.reason}`).join("; ")}
` : "";

  const note = `
PRESENTING COMPLAINT:
${conversation.symptoms || "Not recorded"}

KEY FINDINGS / RESPONSES:
${conversation.answers.join("\n") || "Not recorded"}

ASSESSMENT:
${latestAI?.overall_assessment || latestDiagnostic?.image_assessment || "Further clinical assessment required."}

POSSIBLE CONDITIONS:
${(latestAI?.conditions || latestDiagnostic?.possible_conditions || []).map(c => `${c.name} (${c.likelihood}) - ${c.reason}`).join("\n") || "Not recorded"}

TRIAGE:
Score: ${latestAI?.triage_score ?? latestDiagnostic?.triage?.score ?? "Not recorded"}
Urgency: ${latestAI?.urgency || latestDiagnostic?.triage?.urgency || "Not recorded"}

DOCUMENTATION OPPORTUNITIES:
${documentation.join("\n") || "None recorded"}

${diagSummary}

PLAN:
- Continue clinical assessment.
- Confirm diagnoses clinically.
- Escalate if red flags or worsening symptoms.
- Ensure diagnostic requests are reviewed and authorised by a clinician.
- Ensure documentation supports clinical reality and coding integrity.
`;

  const el = document.getElementById("note");
  if(el) el.value = note.trim();
}

function generateFHIR(){
  const noteText = document.getElementById("note")?.value || "";
  const imaging = latestDiagnostic?.recommended_diagnostics?.imaging || [];
  const pathology = latestDiagnostic?.recommended_diagnostics?.pathology || [];

  const serviceRequests = [];

  imaging.forEach(function(x,i){
    serviceRequests.push({
      resource:{
        resourceType:"ServiceRequest",
        id:"imaging-request-" + (i+1),
        status:"draft",
        intent:"proposal",
        category:[{text:"Diagnostic imaging"}],
        code:{text:x.test},
        subject:{reference:"Patient/demo-patient"},
        encounter:{reference:"Encounter/demo-encounter"},
        reasonCode:[{text:x.reason}],
        note:[{text:"Urgency: " + x.urgency + ". Clinician authorisation required."}]
      }
    });
  });

  pathology.forEach(function(x,i){
    serviceRequests.push({
      resource:{
        resourceType:"ServiceRequest",
        id:"pathology-request-" + (i+1),
        status:"draft",
        intent:"proposal",
        category:[{text:"Pathology"}],
        code:{text:x.test},
        subject:{reference:"Patient/demo-patient"},
        encounter:{reference:"Encounter/demo-encounter"},
        reasonCode:[{text:x.reason}],
        note:[{text:"Urgency: " + x.urgency + ". Clinician authorisation required."}]
      }
    });
  });

  const bundle = {
    resourceType:"Bundle",
    type:"collection",
    timestamp:new Date().toISOString(),
    entry:[
      {resource:{resourceType:"Patient",id:"demo-patient"}},
      {resource:{resourceType:"Encounter",id:"demo-encounter",status:"in-progress",subject:{reference:"Patient/demo-patient"}}},
      {resource:{resourceType:"Condition",id:"presenting-complaint",code:{text:conversation.symptoms || "Symptoms not recorded"},subject:{reference:"Patient/demo-patient"}}},
      {resource:{resourceType:"Observation",id:"triage-score",status:"final",code:{text:"AI triage score"},valueInteger:latestAI?.triage_score || latestDiagnostic?.triage?.score || 0}},
      {resource:{resourceType:"DocumentReference",id:"clinical-note",status:"current",description:"Structured clinical note generated by Diagnose Me",content:[{attachment:{contentType:"text/plain",data:btoa(unescape(encodeURIComponent(noteText)))}}]}},
      ...serviceRequests
    ]
  };

  const el = document.getElementById("fhir");
  if(el) el.value = JSON.stringify(bundle, null, 2);
}

function downloadNote(){
  downloadText("clinical_note.txt", document.getElementById("note").value, "text/plain");
}

function downloadFHIR(){
  downloadText("diagnose_me_fhir_bundle.json", document.getElementById("fhir").value, "application/json");
}

function downloadText(filename, text, type){
  const blob = new Blob([text], { type });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

function showDiagnostics(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Diagnostics & Orders</h2>
      <p class="muted">Upload an image and describe the issue. This creates clinician-reviewable diagnostic suggestions only.</p>

      <textarea id="diagDescription" placeholder="Example: swollen red toe, rash on arm, ankle injury after fall..."></textarea>
      <input type="file" id="diagImage" accept="image/*" onchange="previewImage()">
      <img id="preview" class="preview" style="display:none">

      <button onclick="runDiagnostics()">Analyse Image & Diagnostic Pathway</button>
      <div id="diagOut"></div>
    </div>
  `;
}

function previewImage(){
  const file = document.getElementById("diagImage").files[0];
  if(!file) return;

  const img = document.getElementById("preview");
  img.src = URL.createObjectURL(file);
  img.style.display = "block";
}

function fileToBase64(file){
  return new Promise(function(resolve,reject){
    const reader = new FileReader();
    reader.onload = function(){ resolve(reader.result.split(",")[1]); };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function runDiagnostics(){
  const description = document.getElementById("diagDescription").value;
  const file = document.getElementById("diagImage").files[0];

  document.getElementById("diagOut").innerHTML = '<div class="box">Analysing image and diagnostic pathway...</div>';

  let imageBase64 = null;
  let mimeType = null;

  if(file){
    imageBase64 = await fileToBase64(file);
    mimeType = file.type;
  }

  const res = await fetch("/ai/diagnostics-assist", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ description, imageBase64, mimeType })
  });

  const data = await res.json();
  latestDiagnostic = data;

  renderDiagnostics(data);
}

function renderDiagnostics(data){
  const imaging = data.recommended_diagnostics?.imaging || [];
  const pathology = data.recommended_diagnostics?.pathology || [];

  document.getElementById("diagOut").innerHTML = `
    <div class="box"><b>Image Assessment</b><br>${data.image_assessment || ""}</div>
    <div class="box"><b>Triage</b><br>Score: ${data.triage?.score ?? "Not recorded"}<br>Urgency: ${data.triage?.urgency || "Not recorded"}</div>
    <div class="box"><b>Possible Conditions</b><br>${(data.possible_conditions || []).map(c => `• ${c.name} (${c.likelihood}) — ${c.reason}`).join("<br>") || "None generated"}</div>
    <div class="box"><b>Recommended Imaging</b><br>${imaging.length ? imaging.map(x => `• ${x.test} — ${x.reason} (${x.urgency})`).join("<br>") : "No imaging recommendation generated"}</div>
    <div class="box"><b>Recommended Pathology</b><br>${pathology.length ? pathology.map(x => `• ${x.test} — ${x.reason} (${x.urgency})`).join("<br>") : "No pathology recommendation generated"}</div>
    <div class="box"><b>Order Drafts</b><br><br><b>Pathology:</b><br>${data.order_drafts?.pathology_request || "No pathology draft generated"}<br><br><b>Imaging:</b><br>${data.order_drafts?.imaging_request || "No imaging draft generated"}</div>
    <button onclick="addDiagnosticOrdersToDocumentation()">Add Diagnostic Drafts to Documentation</button>
  `;

  generateNote();
  generateFHIR();
}

function addDiagnosticOrdersToDocumentation(){
  if(!latestDiagnostic) return;

  const imaging = (latestDiagnostic.recommended_diagnostics?.imaging || []).map(x => "Imaging: " + x.test + " — " + x.reason);
  const pathology = (latestDiagnostic.recommended_diagnostics?.pathology || []).map(x => "Pathology: " + x.test + " — " + x.reason);

  documentation.push(...imaging, ...pathology);
  generateNote();
  generateFHIR();
  alert("Diagnostic drafts added");
}

function showClinicalAssistant(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Documentation Assistant</h2>
      <textarea id="docAssistNote" placeholder="Paste clinical notes here..."></textarea>
      <button onclick="analyseDocumentation()">Analyse Documentation</button>
      <div id="docAssistOut"></div>
    </div>
  `;
}

async function analyseDocumentation(){
  const note = document.getElementById("docAssistNote").value;

  document.getElementById("docAssistOut").innerHTML = '<div class="box">Analysing documentation...</div>';

  const res = await fetch("/ai/clinical-assist", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ note })
  });

  const data = await res.json();

  document.getElementById("docAssistOut").innerHTML = `
    <div class="box"><b>Suggestions</b><br>${(data.suggestions || []).map(x => "• " + x).join("<br>") || "No suggestions generated"}</div>
    <div class="box"><b>Funding Prompts</b><br>${(data.funding_prompts || []).map(x => "• " + x.prompt + " → " + safeMoney(x.estimated_uplift)).join("<br>") || "No funding prompts generated"}</div>
    <div class="box"><b>Audit Risks</b><br>${(data.audit_risks || []).map(x => "• " + x).join("<br>") || "No audit risks generated"}</div>
    <div class="box"><b>Revenue Impact</b><br>Base: ${safeMoney(data.revenue?.base)}<br>Potential: ${safeMoney(data.revenue?.potential)}<br>Uplift: ${safeMoney(data.revenue?.uplift)}</div>
  `;
}

function showDRG(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Funding Estimator</h2>
      <input id="dx" placeholder="Example: pneumonia with respiratory failure">
      <button onclick="runDRG()">Estimate Funding</button>
      <div id="drgOut"></div>
    </div>
  `;
}

async function runDRG(){
  const diagnosis = document.getElementById("dx").value;

  const res = await fetch("/drg/estimate", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ diagnosis })
  });

  const data = await res.json();

  document.getElementById("drgOut").innerHTML = `
    <div class="box">
      Predicted funding: <b>${safeMoney(data.funding)}</b>
      <input id="actual" placeholder="Enter actual funding received">
      <button onclick="saveCase(${data.funding})">Save Case</button>
    </div>
  `;
}

async function saveCase(predicted){
  const actual = Number(document.getElementById("actual").value || 0);

  await fetch("/pilot/track", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ predicted, actual })
  });

  alert("Case saved");
}

async function showCases(){
  const res = await fetch("/pilot/data");
  const data = await res.json();

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Case Tracking</h2>
      <table>
        <tr><th>ID</th><th>Predicted</th><th>Actual</th><th>Variance</th><th>Date</th></tr>
        ${data.map(r => `
          <tr>
            <td>${r.id}</td>
            <td>${safeMoney(r.predicted)}</td>
            <td>${safeMoney(r.actual)}</td>
            <td>${safeMoney(Number(r.actual) - Number(r.predicted))}</td>
            <td>${new Date(r.created_at).toLocaleString()}</td>
          </tr>
        `).join("")}
      </table>
    </div>
  `;
}

async function showMetrics(){
  const res = await fetch("/pilot/metrics");
  const d = await res.json();

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Metrics</h2>
      <div class="grid">
        <div class="metric">Predicted<b>${safeMoney(d.predicted)}</b></div>
        <div class="metric">Actual<b>${safeMoney(d.actual)}</b></div>
        <div class="metric">Variance<b>${safeMoney(d.delta)}</b></div>
        <div class="metric">Cases<b>${d.total}</b></div>
      </div>
    </div>
  `;
}

showChat();
</script>

</body>
</html>
