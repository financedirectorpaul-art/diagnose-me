<!DOCTYPE html>
<html>
<head>
<title>Diagnose Me</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
body{font-family:Arial;background:#0f172a;margin:0;color:#e5e7eb}
.container{display:grid;grid-template-columns:260px 1fr;height:100vh}
.sidebar{background:#020617;padding:20px}
.sidebar div{margin-bottom:10px;cursor:pointer}
.chat{padding:20px;height:60vh;overflow:auto}
.bubble{padding:10px;margin:10px;border-radius:10px;max-width:70%}
.user{background:#7c3aed;margin-left:auto}
.ai{background:#1e293b}
input,textarea{width:100%;padding:10px;margin-top:10px;background:#020617;color:white;border:1px solid #334155}
button{margin-top:10px;padding:10px;background:#7c3aed;border:none;color:white}
.clickable{color:#a78bfa;cursor:pointer}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
  <div onclick="showChat()">Clinical Chat</div>
  <div onclick="showDiagnostics()">Diagnostics</div>
</div>

<div id="main"></div>

</div>

<script>

// ================= STATE =================

let conversation = {
  symptoms:"",
  answers:[],
  stage:"initial"
};

let pendingQuestions = [];
let documentation = [];
let latestAI = null;

// ================= CHAT =================

function showChat(){
main.innerHTML=`
<div id="chat" class="chat"></div>
<input id="input" placeholder="Describe symptoms">
<button onclick="send()">Send</button>
<textarea id="note"></textarea>
<button onclick="downloadNote()">Download Note</button>
<button onclick="newConsult()">New Consultation</button>
`;

addAI("Start a consultation — tell me your symptoms.");
}

function addUser(t){chat.innerHTML+=`<div class="bubble user">${t}</div>`}
function addAI(t){chat.innerHTML+=`<div class="bubble ai">${t}</div>`}

// ================= SEND =================

async function send(){

let t=input.value.trim();
if(!t) return;

addUser(t);
input.value="";

// INITIAL
if(conversation.stage==="initial"){
conversation.symptoms=t;
conversation.stage="followup";
await askAI();
return;
}

// FOLLOW-UP
if(conversation.stage==="followup"){
conversation.answers.push(t);

if(pendingQuestions.length>0){
pendingQuestions.shift();
}

// ask next question
if(pendingQuestions.length>0){
addAI(pendingQuestions[0]);
return;
}

// FINAL
conversation.stage="final";
await askAI(true);
return;
}

}

// ================= AI =================

async function askAI(final=false){

addAI("Thinking...");

const res=await fetch("/ai/personal-check",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify(conversation)
});

const data=await res.json();
latestAI=data;

chat.lastChild.remove();

// FOLLOW-UP MODE
if(!final && data.follow_up_questions?.length){
pendingQuestions=data.follow_up_questions;
addAI(pendingQuestions[0]);
return;
}

// FINAL MODE
renderFinal(data);
}

// ================= FINAL =================

function renderFinal(data){

let out="";

if(data.red_flags?.length){
out+=`<b style="color:red">⚠️ Red Flags</b><br>`;
data.red_flags.forEach(r=>out+=`• ${r}<br>`);
out+="<br>";
}

out+=`<b>Triage:</b> ${data.triage_score}/100<br>`;
out+=`<b>Urgency:</b> ${data.urgency}<br><br>`;

if(data.conditions){
data.conditions.forEach(c=>{
out+=`• ${c.name} (${c.likelihood})<br>`;
});
}

out+=`<br>${data.overall_assessment}`;

// FUNDING PROMPTS
if(data.revenue_prompts){
out+=`<br><br><b>Click to add:</b><br>`;
data.revenue_prompts.forEach(p=>{
out+=`<span class="clickable" onclick="addDoc('${p.message}')">${p.message} → $${p.value}</span><br>`;
});
}

// FUNDING
if(data.funding){
out+=`<br><br>Funding: $${data.funding.baseline} → $${data.funding.potential}`;
}

addAI(out);
}

// ================= DOC =================

function addDoc(t){
documentation.push(t);
note.value=documentation.join("\n");
}

function downloadNote(){
const blob=new Blob([note.value]);
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="note.txt";
a.click();
}

// ================= RESET =================

function newConsult(){
conversation={symptoms:"",answers:[],stage:"initial"};
pendingQuestions=[];
chat.innerHTML="";
addAI("New consultation started.");
}

// ================= DIAGNOSTICS =================

function showDiagnostics(){
main.innerHTML=`
<textarea id="desc"></textarea>
<input type="file" id="img">
<button onclick="runDiag()">Analyse</button>
<div id="out"></div>
`;
}

async function runDiag(){

let file=img.files[0];
let base64=null;

if(file){
const reader=new FileReader();
base64=await new Promise(r=>{
reader.onload=()=>r(reader.result.split(",")[1]);
reader.readAsDataURL(file);
});
}

const res=await fetch("/ai/diagnostics-assist",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({description:desc.value,imageBase64:base64})
});

const data=await res.json();

out.innerHTML=data.image_assessment;
}

showChat();

</script>

</body>
</html>
