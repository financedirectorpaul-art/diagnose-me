<!DOCTYPE html>
<html>
<head>
  <title>Diagnose Me</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body{font-family:Arial;background:#0f172a;color:white;margin:0}
    .container{display:grid;grid-template-columns:250px 1fr;height:100vh}
    .sidebar{background:#020617;padding:20px}
    .sidebar div{margin-bottom:10px;cursor:pointer}
    .chat{padding:20px;overflow-y:auto;height:70vh}
    .bubble{padding:10px;margin:10px;border-radius:10px;max-width:70%}
    .user{background:#7c3aed;margin-left:auto}
    .ai{background:#1e293b}
    input,textarea{width:100%;padding:10px;margin-top:10px;background:#020617;color:white;border:1px solid #334155}
    button{margin-top:10px;padding:10px;background:#7c3aed;border:none;color:white}
    .clickable{color:#a78bfa;cursor:pointer}
  </style>
</head>

<body>

<div class="container">

<div class="sidebar">
  <div onclick="showChat()">Clinical Chat</div>
  <div onclick="showDiagnostics()">Diagnostics</div>
</div>

<div id="main"></div>

</div>

<script>

let conversation={symptoms:"",answers:[]};
let documentation=[];

// ================= CHAT =================

function showChat(){
  document.getElementById("main").innerHTML=`
    <div id="chat" class="chat"></div>
    <input id="input" placeholder="Describe symptoms">
    <button onclick="send()">Send</button>
    <textarea id="note"></textarea>
    <button onclick="downloadNote()">Download Note</button>
  `;
}

function addUser(t){
  chat.innerHTML+=`<div class="bubble user">${t}</div>`;
}

function addAI(t){
  chat.innerHTML+=`<div class="bubble ai">${t}</div>`;
}

async function send(){
  const t=input.value;
  addUser(t);
  input.value="";

  if(!conversation.symptoms) conversation.symptoms=t;
  else conversation.answers.push(t);

  addAI("Thinking...");

  const res=await fetch("/ai/personal-check",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify(conversation)
  });

  const data=await res.json();

  let out=`<b>Assessment:</b><br>${data.overall_assessment}`;

  if(data.revenue_prompts){
    out+=`<br><br><b>Click to add:</b><br>`;
    data.revenue_prompts.forEach(p=>{
      out+=`<span class="clickable" onclick="addDoc('${p.message}')">${p.message}</span><br>`;
    });
  }

  addAI(out);
}

// ================= DOC =================

function addDoc(t){
  documentation.push(t);
  note.value=documentation.join("\n");
}

function downloadNote(){
  const blob=new Blob([note.value]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="note.txt";
  a.click();
}

// ================= DIAGNOSTICS =================

function showDiagnostics(){
  document.getElementById("main").innerHTML=`
    <textarea id="desc" placeholder="Describe issue"></textarea>
    <input type="file" id="img">
    <button onclick="runDiag()">Analyse</button>
    <div id="out"></div>
  `;
}

async function runDiag(){
  const file=img.files[0];
  let base64=null;

  if(file){
    const reader=new FileReader();
    base64=await new Promise(r=>{
      reader.onload=()=>r(reader.result.split(",")[1]);
      reader.readAsDataURL(file);
    });
  }

  const res=await fetch("/ai/diagnostics-assist",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({description:desc.value,imageBase64:base64})
  });

  const data=await res.json();

  out.innerHTML=`
    <b>Image Assessment:</b><br>${data.image_assessment}<br><br>
    <b>Imaging:</b><br>${data.recommended_diagnostics.imaging.map(x=>x.test).join("<br>")}<br><br>
    <b>Pathology:</b><br>${data.recommended_diagnostics.pathology.map(x=>x.test).join("<br>")}
  `;
}

showChat();

</script>

</body>
</html>
