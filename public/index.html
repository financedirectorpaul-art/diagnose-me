<!DOCTYPE html>
<html>
<head>
  <title>Diagnose Me — AI Health Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{--p700:#6d28d9;--p600:#7c3aed;--line:#e9d5ff}
    body{font-family:Arial;background:radial-gradient(circle,#7c3aed,#1e123d);color:#fff;text-align:center;padding:20px;margin:0}
    .wrap{max-width:900px;margin:auto}
    .card{background:#fff;color:#1e123d;padding:24px;border-radius:20px;margin-top:20px}
    button{padding:14px;border-radius:12px;border:none;margin:8px;font-weight:bold;cursor:pointer}
    .primary{background:linear-gradient(135deg,#6d28d9,#7c3aed);color:#fff}
    .ghost{background:#f5f3ff}
    .danger{background:#dc2626;color:#fff}
    input,textarea{width:90%;padding:12px;border-radius:12px;margin-top:10px}
    .cta{background:linear-gradient(135deg,#6d28d9,#7c3aed);color:#fff;padding:16px;border-radius:16px;margin-top:20px}
    .tabs{display:flex;justify-content:center;gap:10px;margin-bottom:10px}
    .tab{background:#eee;color:#1e123d;padding:10px 14px;border-radius:10px;font-weight:bold;cursor:pointer}
    .active{background:#6d28d9;color:#fff}
    .history{background:#f5f3ff;border-radius:12px;padding:10px;margin-top:10px;text-align:left}
    .paywall{border:2px dashed #6d28d9;border-radius:12px;padding:12px;margin-top:12px}
    .plans{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}
    .plan{border:1px solid var(--line);border-radius:12px;padding:12px;text-align:left}
    .plan b{font-size:18px}
    .meter{height:10px;background:#eee;border-radius:8px;overflow:hidden;margin:8px 0}
    .meter>div{height:100%;background:#6d28d9}
  </style>
</head>
<body>
<div class="wrap">
  <h1>Diagnose Me</h1>
  <p><b>AI Triage Platform</b></p>

  <div class="tabs">
    <div class="tab" id="tab-consumer" onclick="setMode('consumer')">Consumer</div>
    <div class="tab" id="tab-health" onclick="setMode('health')">Health System</div>
    <div class="tab" id="tab-impact" onclick="setMode('impact')">Social Impact</div>
  </div>

  <div class="card" id="app"></div>
</div>

<script>
// FIX: use same server endpoint when deployed together on Render
const AI_ENDPOINT = "/analyze";

let mode = "consumer";
let step = 0;
let answers = { text:"", imageBase64:"" };
let usageCount = 0; // force reset for testing
localStorage.setItem('usage', 0);
// TEMP: increase limit for testing
const FREE_LIMIT = 999;

function setMode(m){
  mode = m; step = 0;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+m).classList.add('active');
  render();
}

function usageMeter(){
  const pct = Math.min(100, Math.round((usageCount/FREE_LIMIT)*100));
  return `<div class='meter'><div style='width:${pct}%'></div></div><div class='small'>${usageCount}/${FREE_LIMIT} free checks used</div>`;
}

function pricingConsumer(){
  return `
  <h2>Upgrade</h2>
  <div class='plans'>
    <div class='plan'>
      <b>Free</b><br>
      • ${FREE_LIMIT} checks / month<br>
      • Basic guidance
    </div>
    <div class='plan'>
      <b>Pro — $9.99/mo</b><br>
      • Unlimited checks<br>
      • History + tracking<br>
      • Faster responses
      <br><button class='primary' onclick='checkout("pro")'>Choose Pro</button>
    </div>
    <div class='plan'>
      <b>Family — $19.99/mo</b><br>
      • 5 users<br>
      • Priority support
      <br><button class='primary' onclick='checkout("family")'>Choose Family</button>
    </div>
  </div>
  <div style="margin-top:15px">
    <button class='ghost' onclick='resetUsage()'>Reset Usage</button>
  </div>
  <button onclick='render()'>Back</button>`;
}

function pricingHealth(){
  return `
  <h2>Enterprise Pricing</h2>
  <div class='plans'>
    <div class='plan'>
      <b>Starter — $1k/mo</b><br>
      • 5 seats<br>
      • Basic reports
    </div>
    <div class='plan'>
      <b>Clinic — $5k/mo</b><br>
      • 25 seats<br>
      • Advanced analytics
    </div>
    <div class='plan'>
      <b>Hospital — Custom</b><br>
      • Unlimited seats<br>
      • API + integration
      <br><button class='primary' onclick='contactSales()'>Contact Sales</button>
    </div>
  </div>
  <button onclick='render()'>Back</button>`;
}

function pricingImpact(){
  return `
  <h2>Support This Service</h2>
  <div class='plans'>
    <div class='plan'><b>$5/mo</b><br>Helps keep the service free</div>
    <div class='plan'><b>$20/mo</b><br>Supports vulnerable users</div>
    <div class='plan'><b>Partner</b><br>Organisation sponsorship<br><button class='primary' onclick='contactSales()'>Partner</button></div>
  </div>
  <button onclick='donate()' class='primary'>Donate</button>
  <button onclick='render()'>Back</button>`;
}

function render(){
  const app = document.getElementById('app');

  if(mode === "consumer"){
    if(step===0){
      app.innerHTML=`
        <h2>Personal Health Check</h2>
        <p>Know what to do next in seconds</p>
        ${usageMeter()}
        <button class="primary" onclick="step=1;render()">Start</button>
        <button class="ghost" onclick="showHistory()">History</button>
        <button class="ghost" onclick="resetUsage()">Reset Usage</button>
        <button class="ghost" onclick="app.innerHTML=pricingConsumer()">Pricing</button>
      `;
    }
    if(step===1){
      app.innerHTML=`
        <h3>Describe Symptoms</h3>
        <textarea oninput="answers.text=this.value"></textarea>
        <button class="primary" onclick="analyze()">Analyse</button>
      `;
    }
  }

  if(mode === "health"){
    if(step===0){
      app.innerHTML=`
        <h2>Clinical Triage Tool</h2>
        <button class="primary" onclick="step=1;render()">Start Triage</button>
        <button class="ghost" onclick="app.innerHTML=pricingHealth()">Pricing</button>
      `;
    }
    if(step===1){
      app.innerHTML=`
        <h3>Patient Summary</h3>
        <textarea oninput="answers.text=this.value"></textarea>
        <button class="primary" onclick="analyze()">Run</button>
      `;
    }
  }

  if(mode === "impact"){
    if(step===0){
      app.innerHTML=`
        <h2>Support & Safety Check</h2>
        <button class="primary" onclick="step=1;render()">Start</button>
        <button class="danger" onclick="quickExit()">Quick Exit</button>
        <button class="ghost" onclick="app.innerHTML=pricingImpact()">Support</button>
      `;
    }
    if(step===1){
      app.innerHTML=`
        <h3>What's happening?</h3>
        <textarea oninput="answers.text=this.value"></textarea>
        <button class="primary" onclick="analyze()">Get Guidance</button>
        <button class="danger" onclick="quickExit()">Quick Exit</button>
      `;
    }
  }
}

function quickExit(){ window.location.href = "https://www.google.com"; }
function donate(){ window.open("https://www.paypal.com/donate"); }
function contactSales(){ alert("sales@diagnoseme.com"); }
function checkout(plan){ alert("Connect Stripe for: "+plan); }

function saveHistory(out){
  let h = JSON.parse(localStorage.getItem('history')||'[]');
  h.push({time:new Date().toLocaleString(),result:out.nextStep});
  localStorage.setItem('history',JSON.stringify(h));
}

function resetUsage(){
  localStorage.setItem('usage', 0);
  usageCount = 0;
  render();
}

function showHistory(){
  let h = JSON.parse(localStorage.getItem('history')||'[]');
  let html = '<h2>History</h2>';
  h.reverse().forEach(x=> html += `<div class='history'><b>${x.time}</b><br>${x.result}</div>`);
  html += `<button onclick='render()'>Back</button>`;
  document.getElementById('app').innerHTML = html;
}

async function analyze(){
  usageCount++; localStorage.setItem('usage',usageCount);

  // TEMP: disable paywall during testing
// if(mode==='consumer' && usageCount>FREE_LIMIT){
//   document.getElementById('app').innerHTML = pricingConsumer();
//   return;
// }

  document.getElementById('app').innerHTML="<h2>Analysing with Clinical AI...</h2>";

  try{
    const res = await fetch(AI_ENDPOINT,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(answers)
    });

    if(!res.ok){
      const text = await res.text();
      throw new Error("Backend error: " + text);
    }

    const out = await res.json();

    if(!out || !out.nextStep){
      throw new Error("Invalid AI response");
    }

    saveHistory(out);

    let extra = "";

    if(mode === "consumer"){
      extra = `
        <button class='primary' onclick='window.open("https://healthdirect.gov.au")'>Talk to GP</button>
        <button class='ghost' onclick='analyze()'>Check Again Later</button>`;
    }

    if(mode === "health"){
      extra = `
        <div class='cta'>Risk Level: ${out.urgency || (out.confidence > 80 ? 'High' : 'Moderate')}</div>
        <button class='ghost' onclick='window.print()'>Export Report</button>`;
    }

    if(mode === "impact"){
      extra = `<div class='cta'>If unsafe, contact emergency services or a support hotline immediately</div>`;
    }

    document.getElementById('app').innerHTML=`
      <h2>Clinical Assessment</h2>

      <div style="text-align:left">
        <p style="margin-bottom:12px;font-size:15px">
          Based on what you’ve described, here’s how I would approach this clinically.
        </p>

        <h3>Most likely causes</h3>
        <ul>
          ${(out.causes || []).map(c => `
            <li style="margin-bottom:10px">
              <b>${c.name}</b> (${Math.round(c.confidence <=1 ? c.confidence*100 : c.confidence)}%)<br>
              <span style="font-size:13px;color:#444">${c.reason}</span>
            </li>
          `).join('')}
        </ul>

        <h3>What I recommend next</h3>
        <p>${out.nextStep}</p>

        <h3>Red flags — seek urgent care if these occur</h3>
        <ul>
          ${(out.redFlags || []).map(r => `<li>${r}</li>`).join('')}
        </ul>

        <h3>Initial management</h3>
        <ul>
          ${(out.treatment || []).map(t => `<li>${t}</li>`).join('')}
        </ul>

        <div style="margin-top:12px;padding:10px;background:#f5f3ff;border-radius:10px">
          <b>Clinical confidence:</b> ${Math.round(out.confidence <= 1 ? out.confidence * 100 : out.confidence)}%
        </div>
      </div>

      ${extra}

      <button onclick="step=0;render()">Restart</button>
    `;

  }catch(e){
    document.getElementById('app').innerHTML=`
      <h2>Connection Issue</h2>
      <p>${e.message}</p>
      <p>👉 Check Render logs — likely backend error (API, model, or request format)</p>
      <button onclick="step=0;render()">Back</button>
    `;
  }
}

setMode('consumer');
// --- REVENUE PROJECTIONS ---
function showProjections(){
  document.getElementById('app').innerHTML=`
    <h2>Revenue Projections</h2>

    <h3>🧍 Consumer</h3>
    <p>Assumptions:</p>
    <ul>
      <li>1,000 users</li>
      <li>5% convert to Pro ($9.99)</li>
    </ul>
    <p><b>$500/month (~$6k/year)</b></p>

    <p>If scaled to 10,000 users → <b>$5,000/month ($60k/year)</b></p>
    <p>If scaled to 50,000 users → <b>$25,000/month ($300k/year)</b></p>

    <h3>🏥 Health System</h3>
    <ul>
      <li>5 clients @ $1k/month = $5k/month</li>
      <li>10 clients @ $5k/month = $50k/month</li>
    </ul>
    <p><b>$60k–$600k/year potential early</b></p>

    <h3>🤝 Social Impact</h3>
    <ul>
      <li>100 donors @ $10/month = $1k/month</li>
      <li>Grants = $50k–$200k/year</li>
    </ul>

    <h3>🚀 Combined Potential</h3>
    <p>Year 1: <b>$50k–$150k</b></p>
    <p>Year 2: <b>$250k–$750k</b></p>
    <p>Year 3+: <b>$1M+</b></p>

    <button onclick='render()'>Back</button>
  `;
}

// Add projections button to UI
const originalRender = render;
render = function(){
  originalRender();
  const app = document.getElementById('app');
  if(step===0){
    app.innerHTML += `<br><button class='ghost' onclick='showProjections()'>View Revenue Projections</button>`;
  }
}

</script>
</body>
</html>
