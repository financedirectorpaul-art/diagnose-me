<!DOCTYPE html>
<html>
<head>
  <title>Diagnose Me</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body{font-family:Arial;background:#0b0720;color:#fff;margin:0}
    .topbar{padding:15px;background:#120d2f;display:flex;justify-content:space-between}
    .container{display:grid;grid-template-columns:250px 1fr;height:calc(100vh - 60px)}
    .sidebar{background:#120d2f;padding:15px}
    .sidebar div{margin-bottom:10px;cursor:pointer}
    .content{padding:20px}
    .card{background:#fff;color:#111;padding:20px;border-radius:12px;margin-bottom:20px}
    textarea,input{width:100%;margin-top:10px;padding:10px}
    button{margin-top:10px;padding:10px;background:#6d28d9;color:#fff;border:none}
    .suggestion{background:#f3f0ff;padding:10px;margin-top:10px;border-radius:10px}
    .pill{padding:5px 10px;border-radius:10px;color:#fff}
    .HIGH{background:#dc2626}.MEDIUM{background:#d97706}.LOW{background:#16a34a}
    .error{color:red;margin-top:10px}
  </style>
</head>

<body>

<div class="topbar">
  <div><b>Diagnose Me</b></div>
  <div id="pilotStatus"></div>
</div>

<div class="container">

  <div class="sidebar">
    <div onclick="togglePilot()">Pilot Mode</div>
    <div onclick="showPersonal()">Personal Health Check</div>
  </div>

  <div class="content" id="app"></div>

</div>

<script>

// ================= STATE =================

let pilot = localStorage.getItem("pilot") === "true";

let conversation = {
  symptoms: "",
  answers: []
};

updatePilot();

// ================= PILOT =================

function togglePilot(){
  pilot = !pilot;
  localStorage.setItem("pilot", pilot);
  updatePilot();
}

function updatePilot(){
  document.getElementById("pilotStatus").innerText =
    "Pilot Mode: " + (pilot ? "ON" : "OFF");
}

// ================= UI =================

function showPersonal(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Personal Health Check</h2>
      <textarea id="symptom" placeholder="Describe your symptoms"></textarea>
      <button onclick="startAssessment()">Start Assessment</button>
      <div id="out"></div>
      <div id="error" class="error"></div>
    </div>
  `;
}

// ================= AI =================

async function startAssessment(){

  const input = document.getElementById("symptom").value;

  if(!input){
    document.getElementById("error").innerText = "Please enter symptoms.";
    return;
  }

  document.getElementById("error").innerText = "";

  conversation = {
    symptoms: input,
    answers: []
  };

  await getAIResponse();
}

async function getAIResponse(){

  document.getElementById("out").innerHTML = "Thinking...";

  try{

    const url = window.location.origin + "/ai/personal-check";

    console.log("Calling:", url);

    const res = await fetch(url, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(conversation)
    });

    if(!res.ok){
      const text = await res.text();
      throw new Error("Server error: " + text);
    }

    const data = await res.json();

    renderAI(data);

  }catch(e){
    console.error(e);
    document.getElementById("out").innerHTML = "";
    document.getElementById("error").innerText =
      "Connection error: " + e.message;
  }
}

// ================= RENDER =================

function renderAI(data){

  const urgencyColor =
    data.urgency === "HIGH" ? "HIGH" :
    data.urgency === "MEDIUM" ? "MEDIUM" : "LOW";

  document.getElementById("out").innerHTML = `
    <div class="suggestion">
      <b>Possible causes:</b><br>
      ${data.causes.join("<br>")}
    </div>

    <div class="suggestion">
      <b>Clinical reasoning:</b><br>
      ${data.reasoning}
    </div>

    <div class="suggestion">
      <b>Urgency:</b>
      <span class="pill ${urgencyColor}">${data.urgency}</span>
    </div>

    <div class="suggestion">
      <b>Follow-up questions:</b><br>
      ${data.questions.map((q,i)=>`
        <div>
          ${q}<br>
          <input id="q${i}" placeholder="Your answer">
        </div>
      `).join("")}
    </div>

    <button onclick="submitAnswers(${data.questions.length})">
      Continue Assessment
    </button>

    <div class="suggestion">
      ⚠️ This is general guidance only. Seek medical care if concerned.
    </div>
  `;
}

// ================= ANSWERS =================

function submitAnswers(count){

  for(let i=0;i<count;i++){
    const val = document.getElementById("q"+i).value;
    if(val){
      conversation.answers.push(val);
    }
  }

  getAIResponse();
}

// ================= INIT =================

showPersonal();

</script>

</body>
</html>
