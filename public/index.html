<!DOCTYPE html>
<html>
<head>
  <title>Diagnose Me</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body{font-family:Arial;background:#0b0720;color:#fff;margin:0}
    .topbar{padding:15px;background:#120d2f;display:flex;justify-content:space-between}
    .container{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 60px)}
    .sidebar{background:#120d2f;padding:15px}
    .sidebar div{margin-bottom:10px;cursor:pointer}
    .content{padding:20px}
    .card{background:#fff;color:#111;padding:20px;border-radius:12px;margin-bottom:20px}
    textarea,input{width:100%;margin-top:10px;padding:10px}
    button{margin-top:10px;padding:10px;background:#6d28d9;color:#fff;border:none}
    .suggestion{background:#f3f0ff;padding:10px;margin-top:10px;border-radius:10px}
    .metric{background:#111;color:#fff;padding:10px;margin-top:10px;border-radius:10px}
  </style>
</head>

<body>

<div class="topbar">
  <div><b>Diagnose Me</b></div>
  <div id="pilotStatus"></div>
</div>

<div class="container">

  <div class="sidebar">
    <div onclick="togglePilot()">Pilot Mode</div>

    <div onclick="showHome()">Home</div>
    <div onclick="showPersonal()">Personal Health Check</div>

    <div onclick="showClinical()">Clinical Assistant</div>
    <div onclick="showDRG()">DRG Engine</div>
    <div onclick="showTracking()">Actual vs Predicted</div>
    <div onclick="showMetrics()">Pilot Metrics</div>
    <div onclick="showExecutive()">Executive Dashboard</div>
  </div>

  <div class="content" id="app"></div>

</div>

<script>

// ================= STATE =================

let pilot = localStorage.getItem("pilot") === "true";
let drgData = JSON.parse(localStorage.getItem("drgData") || "[]");

updatePilot();

// ================= PILOT =================

function togglePilot(){
  pilot = !pilot;
  localStorage.setItem("pilot", pilot);
  updatePilot();
}

function updatePilot(){
  document.getElementById("pilotStatus").innerText =
    "Pilot Mode: " + (pilot ? "ON" : "OFF");
}

// ================= HOME =================

function showHome(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Welcome</h2>
      <p>This platform includes both:</p>
      <ul>
        <li>Personal AI Health Check</li>
        <li>Hospital Revenue & Clinical Tools</li>
      </ul>
    </div>

    <div class="card">
      <h3>Quick Actions</h3>
      <button onclick="showPersonal()">Start Health Check</button>
      <button onclick="showClinical()">Open Clinical Assistant</button>
    </div>
  `;
}

// ================= PERSONAL =================

let conversation = { symptoms:"", answers:[] };

function showPersonal(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Personal Health Check</h2>
      <textarea id="symptom"></textarea>
      <button onclick="startAssessment()">Start Assessment</button>
      <div id="out"></div>
    </div>
  `;
}

async function startAssessment(){
  const input = document.getElementById("symptom").value;
  conversation = { symptoms: input, answers: [] };

  const res = await fetch(window.location.origin + "/ai/personal-check",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(conversation)
  });

  const data = await res.json();

  document.getElementById("out").innerHTML = `
    <div class="suggestion">${data.reasoning || data.output || "Response received"}</div>
  `;
}

// ================= CLINICAL =================

function showClinical(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Clinical Assistant</h2>
      <textarea oninput="assist(this.value)"></textarea>
      <div id="suggestions"></div>
    </div>
  `;
}

function assist(t){
  let s=[];
  if(t.includes("pneumonia")) s.push("Consider sepsis");
  document.getElementById("suggestions").innerHTML =
    s.map(x=>`<div class="suggestion">${x}</div>`).join("");
}

// ================= DRG =================

function showDRG(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>DRG Engine</h2>
      <button onclick="runDRG()">Run</button>
    </div>
  `;
}

function runDRG(){
  drgData.push({predicted:10000, actual:0});
  localStorage.setItem("drgData", JSON.stringify(drgData));
  showTracking();
}

// ================= TRACKING =================

function showTracking(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      ${drgData.map(r=>`Predicted: ${r.predicted} Actual: ${r.actual}<br>`).join("")}
    </div>
  `;
}

// ================= METRICS =================

function showMetrics(){
  let p = drgData.reduce((a,b)=>a+b.predicted,0);
  let a = drgData.reduce((a,b)=>a+b.actual,0);

  document.getElementById("app").innerHTML = `
    <div class="card">
      Predicted: ${p}<br>
      Actual: ${a}<br>
      Delta: ${a-p}
    </div>
  `;
}

// ================= EXEC =================

function showExecutive(){
  let p = drgData.reduce((a,b)=>a+b.predicted,0);
  let a = drgData.reduce((a,b)=>a+b.actual,0);

  document.getElementById("app").innerHTML = `
    <div class="card">
      Revenue Impact: ${a-p}
    </div>
  `;
}

// ================= INIT =================

showHome();

</script>

</body>
</html>
