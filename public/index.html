<!DOCTYPE html>
<html>
<head>
  <title>Diagnose Me Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body{font-family:Arial;background:#0b0720;color:#fff;margin:0}
    .topbar{padding:15px;background:#120d2f}
    .container{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 60px)}
    .sidebar{background:#120d2f;padding:15px}
    .sidebar div{margin-bottom:10px;cursor:pointer}
    .content{padding:20px}
    .card{background:#fff;color:#111;padding:20px;border-radius:12px;margin-bottom:20px}
    textarea,input{width:100%;margin-top:10px;padding:10px}
    button{margin-top:10px;padding:10px;background:#6d28d9;color:#fff;border:none}
    .box{background:#f3f0ff;padding:10px;margin-top:10px;border-radius:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px}
    th,td{padding:8px;border-bottom:1px solid #ccc}
  </style>
</head>

<body>

<div class="topbar"><b>Diagnose Me Platform</b></div>

<div class="container">

  <div class="sidebar">
    <div onclick="showHome()">Home</div>
    <div onclick="showPersonal()">Personal Health Check</div>
    <div onclick="showDRG()">DRG Engine</div>
    <div onclick="showCases()">Case Tracking</div>
    <div onclick="showMetrics()">Metrics</div>
  </div>

  <div class="content" id="app"></div>

</div>

<script>

// ================= STATE =================

let conversation = { symptoms:"", answers:[] };
let caseData = [];

// ================= HOME =================

function showHome(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Full Platform</h2>
      <p>Clinical AI + Hospital Revenue Intelligence</p>
    </div>
  `;
}

// ================= PERSONAL =================

function showPersonal(){
  conversation = { symptoms:"", answers:[] };

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Personal Health Check</h2>
      <textarea id="symptom"></textarea>
      <button onclick="startAssessment()">Start</button>
      <div id="result"></div>
    </div>
  `;
}

async function startAssessment(){
  conversation.symptoms = document.getElementById("symptom").value;
  callAI();
}

async function callAI(){

  document.getElementById("result").innerHTML = "Thinking...";

  const res = await fetch("/ai/personal-check", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(conversation)
  });

  const data = await res.json();

  document.getElementById("result").innerHTML = `
    <h3>Conditions</h3>

    ${(data.conditions||[]).map(c=>`
      <div class="box">
        <b>${c.name}</b><br>
        ${c.likelihood}<br>
        ${c.reason}
      </div>
    `).join("")}

    <h3>Assessment</h3>
    <div class="box">${data.overall_assessment}</div>

    <h3>Follow-up</h3>

    ${(data.follow_up_questions||[]).map((q,i)=>`
      <div class="box">
        ${q}
        <input id="q${i}">
      </div>
    `).join("")}

    ${(data.follow_up_questions||[]).length ? `
      <button onclick="submitAnswers(${data.follow_up_questions.length})">Continue</button>
    ` : ""}

    <h3>Urgency</h3>
    <div class="box">${data.urgency}</div>
  `;
}

function submitAnswers(n){
  for(let i=0;i<n;i++){
    let v = document.getElementById("q"+i).value;
    if(v) conversation.answers.push(v);
  }
  callAI();
}

// ================= DRG =================

function showDRG(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>DRG Engine</h2>
      <input id="dx">
      <button onclick="runDRG()">Estimate</button>
      <div id="drgOut"></div>
    </div>
  `;
}

async function runDRG(){

  const diagnosis = document.getElementById("dx").value;

  const res = await fetch("/drg/estimate", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ diagnosis })
  });

  const data = await res.json();

  document.getElementById("drgOut").innerHTML = `
    Predicted: $${data.funding}<br>
    <input id="actual" placeholder="Actual funding">
    <button onclick="saveCase(${data.funding})">Save Case</button>
  `;
}

async function saveCase(predicted){

  let actual = Number(document.getElementById("actual").value || 0);

  await fetch("/pilot/track", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ predicted, actual })
  });

  alert("Saved");
}

// ================= CASES =================

async function showCases(){

  const res = await fetch("/pilot/data");
  caseData = await res.json();

  renderTable(caseData);
}

// ================= METRICS =================

async function showMetrics(){

  const res = await fetch("/pilot/metrics");
  const data = await res.json();

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Metrics</h2>
      Predicted: $${data.predicted}<br>
      Actual: $${data.actual}<br>
      Variance: $${data.delta}<br>
      Cases: ${data.total}
    </div>
  `;
}

// ================= TABLE =================

function renderTable(data){

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Case Tracking</h2>

      <button onclick="exportCSV()">Export CSV</button>

      <table>
        <tr>
          <th>ID</th>
          <th>Predicted</th>
          <th>Actual</th>
          <th>Variance</th>
          <th>Date</th>
        </tr>

        ${data.map(r=>`
          <tr>
            <td>${r.id}</td>
            <td>$${r.predicted}</td>
            <td>$${r.actual}</td>
            <td>$${r.actual - r.predicted}</td>
            <td>${new Date(r.created_at).toLocaleString()}</td>
          </tr>
        `).join("")}

      </table>
    </div>
  `;
}

// ================= CSV =================

function exportCSV(){

  let rows = [["ID","Predicted","Actual","Variance","Date"]];

  caseData.forEach(r=>{
    rows.push([
      r.id,
      r.predicted,
      r.actual,
      r.actual - r.predicted,
      r.created_at
    ]);
  });

  let csv = rows.map(r=>r.join(",")).join("\n");

  let blob = new Blob([csv]);
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "cases.csv";
  a.click();
}

// ================= INIT =================

showHome();

</script>

</body>
</html>
