<!DOCTYPE html>
<html>
<head>
  <title>Diagnose Me Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body{font-family:Arial;background:#0b0720;color:#fff;margin:0}
    .topbar{padding:15px;background:#120d2f;display:flex;justify-content:space-between}
    .container{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 60px)}
    .sidebar{background:#120d2f;padding:15px}
    .sidebar div{margin-bottom:10px;cursor:pointer}
    .content{padding:20px}
    .card{background:#fff;color:#111;padding:20px;border-radius:12px;margin-bottom:20px}
    textarea,input,select{width:100%;margin-top:10px;padding:10px}
    button{margin-top:10px;padding:10px;background:#6d28d9;color:#fff;border:none}
    table{width:100%;border-collapse:collapse;margin-top:10px}
    th,td{padding:8px;border-bottom:1px solid #ccc;text-align:left}
  </style>
</head>

<body>

<div class="topbar">
  <div><b>Diagnose Me Platform</b></div>
  <div id="pilotStatus"></div>
</div>

<div class="container">

  <div class="sidebar">
    <div onclick="togglePilot()">Pilot Mode</div>
    <div onclick="showHome()">Home</div>
    <div onclick="showDRG()">DRG Engine</div>
    <div onclick="showCases()">Case Tracking</div>
  </div>

  <div class="content" id="app"></div>

</div>

<script>

let pilot = localStorage.getItem("pilot") === "true";

function togglePilot(){
  pilot = !pilot;
  localStorage.setItem("pilot", pilot);
  document.getElementById("pilotStatus").innerText =
    "Pilot Mode: " + (pilot ? "ON" : "OFF");
}

togglePilot();

// ================= HOME =================

function showHome(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Revenue Intelligence Dashboard</h2>
      <p>Analyse funding variance across cases.</p>
    </div>
  `;
}

// ================= DRG =================

function showDRG(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>DRG Engine</h2>
      <input id="dx" placeholder="Diagnosis">
      <button onclick="runDRG()">Estimate</button>
      <div id="out"></div>
    </div>
  `;
}

async function runDRG(){
  const diagnosis = document.getElementById("dx").value;

  const res = await fetch("/drg/estimate", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ diagnosis })
  });

  const data = await res.json();

  document.getElementById("out").innerHTML = `
    Predicted: $${data.funding}<br>
    <input id="actual" placeholder="Actual funding">
    <button onclick="saveCase(${data.funding})">Save</button>
  `;
}

async function saveCase(predicted){
  const actual = Number(document.getElementById("actual").value || 0);

  await fetch("/pilot/track", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ predicted, actual })
  });

  alert("Saved");
}

// ================= CASE TABLE =================

let caseData = [];

async function showCases(){

  const res = await fetch("/pilot/data");
  caseData = await res.json();

  renderTable(caseData);
}

// ================= FILTER + SORT =================

function applyFilters(){

  let min = Number(document.getElementById("minVar").value || -Infinity);
  let max = Number(document.getElementById("maxVar").value || Infinity);

  let filtered = caseData.filter(r=>{
    let v = r.actual - r.predicted;
    return v >= min && v <= max;
  });

  renderTable(filtered);
}

function sortData(field){

  caseData.sort((a,b)=>{
    if(field==="variance"){
      return (b.actual-b.predicted) - (a.actual-a.predicted);
    }
    if(field==="date"){
      return new Date(b.created_at) - new Date(a.created_at);
    }
  });

  renderTable(caseData);
}

// ================= CSV EXPORT =================

function exportCSV(){

  let rows = [
    ["ID","Predicted","Actual","Variance","Date"]
  ];

  caseData.forEach(r=>{
    rows.push([
      r.id,
      r.predicted,
      r.actual,
      r.actual - r.predicted,
      r.created_at
    ]);
  });

  let csv = rows.map(r=>r.join(",")).join("\n");

  let blob = new Blob([csv], { type: "text/csv" });
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "cases.csv";
  a.click();
}

// ================= RENDER =================

function renderTable(data){

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Case Tracking</h2>

      <h4>Filters</h4>
      Min Variance: <input id="minVar">
      Max Variance: <input id="maxVar">
      <button onclick="applyFilters()">Apply</button>

      <h4>Sort</h4>
      <button onclick="sortData('variance')">Sort by Variance</button>
      <button onclick="sortData('date')">Sort by Date</button>

      <h4>Export</h4>
      <button onclick="exportCSV()">Download CSV</button>

      <table>
        <tr>
          <th>ID</th>
          <th>Predicted</th>
          <th>Actual</th>
          <th>Variance</th>
          <th>Date</th>
        </tr>

        ${data.map(r=>`
          <tr>
            <td>${r.id}</td>
            <td>$${r.predicted}</td>
            <td>$${r.actual}</td>
            <td>$${r.actual - r.predicted}</td>
            <td>${new Date(r.created_at).toLocaleString()}</td>
          </tr>
        `).join("")}
      </table>

    </div>
  `;
}

// ================= INIT =================

showHome();

</script>

</body>
</html>
