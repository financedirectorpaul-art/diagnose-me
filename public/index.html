<!DOCTYPE html>
<html>
<head>
  <title>Diagnose Me</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
      margin: 0;
      background: #0f172a;
      color: #e5e7eb;
    }

    .header {
      padding: 16px;
      background: #020617;
      border-bottom: 1px solid #1e293b;
      font-weight: bold;
    }

    .chat {
      height: calc(100vh - 140px);
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .bubble {
      padding: 12px 14px;
      margin-bottom: 10px;
      border-radius: 12px;
      max-width: 75%;
      white-space: pre-wrap;
    }

    .user {
      background: #7c3aed;
      align-self: flex-end;
    }

    .ai {
      background: #1e293b;
    }

    .inputBar {
      position: sticky;
      bottom: 0;
      background: #020617;
      padding: 12px;
      border-top: 1px solid #1e293b;
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #020617;
      color: white;
    }

    button {
      background: #7c3aed;
      border: none;
      padding: 10px 14px;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    textarea {
      width: 100%;
      height: 150px;
      margin-top: 10px;
      background: #020617;
      color: white;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 10px;
    }

    .section {
      padding: 20px;
      border-top: 1px solid #1e293b;
    }
  </style>
</head>
<body>

<div class="header">Diagnose Me – Clinical AI</div>

<div id="chat" class="chat"></div>

<div class="inputBar">
  <input id="input" placeholder="Describe symptoms..." />
  <button onclick="send()">Send</button>
</div>

<div class="section">
  <b>Structured Clinical Note</b>
  <textarea id="note"></textarea>
  <button onclick="copyNote()">Copy Note</button>
</div>

<div class="section">
  <b>FHIR JSON</b>
  <textarea id="fhir"></textarea>
  <button onclick="copyFHIR()">Copy FHIR</button>
</div>

<script>
let stage = "initial";
let symptoms = "";
let answers = [];

function addUser(text){
  const chat = document.getElementById("chat");
  chat.innerHTML += `<div class="bubble user">${text}</div>`;
  scroll();
}

function addAI(text){
  const chat = document.getElementById("chat");
  chat.innerHTML += `<div class="bubble ai">${text}</div>`;
  scroll();
}

function scroll(){
  const chat = document.getElementById("chat");
  chat.scrollTop = chat.scrollHeight;
}

async function send(){
  const input = document.getElementById("input");
  const text = input.value.trim();
  if(!text) return;

  addUser(text);
  input.value = "";

  if(stage === "initial"){
    symptoms = text;
    stage = "followup";
  } else {
    answers.push(text);
  }

  addAI("Thinking...");

  const res = await fetch("/ai/personal-check", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ symptoms, answers, stage })
  });

  const data = await res.json();

  document.querySelector(".ai:last-child").remove();

  // Follow-up questions
  if(data.follow_up_questions && data.follow_up_questions.length){
    addAI(data.follow_up_questions[0]);
    return;
  }

  stage = "final";

  let output = "";

  output += `Triage Score: ${data.triage_score}\n`;
  output += `Urgency: ${data.urgency}\n\n`;

  output += `Assessment:\n${data.overall_assessment}\n\n`;

  if(data.icd){
    output += `ICD-10 Suggestion:\n${data.icd.code} (${data.icd.description}) — ${data.icd.confidence}%\n\n`;
  }

  output += `CPT Suggestion: ${data.cpt}\n`;
  output += `Denial Risk: ${data.denial_risk}\n`;

  addAI(output);

  generateNote(data);
  generateFHIR(data);
}

function generateNote(data){
  const note = `
PRESENTING COMPLAINT:
${symptoms}

ASSESSMENT:
${data.overall_assessment}

ICD:
${data.icd?.code} - ${data.icd?.description}

PLAN:
- Clinical review
- Confirm diagnosis
- Manage accordingly
`;
  document.getElementById("note").value = note.trim();
}

function generateFHIR(data){
  const fhir = {
    resourceType: "Bundle",
    type: "collection",
    entry: [
      {
        resource: {
          resourceType: "Condition",
          code: {
            text: data.icd?.description
          }
        }
      }
    ]
  };

  document.getElementById("fhir").value = JSON.stringify(fhir, null, 2);
}

function copyNote(){
  navigator.clipboard.writeText(document.getElementById("note").value);
}

function copyFHIR(){
  navigator.clipboard.writeText(document.getElementById("fhir").value);
}

document.getElementById("input").addEventListener("keydown", e => {
  if(e.key === "Enter"){
    e.preventDefault();
    send();
  }
});

addAI("Hi, I'm Dr. Elena. How is the patient presenting today?");
</script>

</body>
</html>
