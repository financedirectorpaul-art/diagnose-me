<!DOCTYPE html>
<html>
<head>
  <title>Diagnose Me</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body{font-family:Arial;background:#0b0720;color:#fff;margin:0}
    .topbar{padding:15px;background:#120d2f;display:flex;justify-content:space-between}
    .container{display:grid;grid-template-columns:250px 1fr;height:calc(100vh - 60px)}
    .sidebar{background:#120d2f;padding:15px}
    .sidebar div{margin-bottom:10px;cursor:pointer}
    .content{padding:20px}
    .card{background:#fff;color:#111;padding:20px;border-radius:12px;margin-bottom:20px}
    textarea,input{width:100%;margin-top:10px;padding:10px}
    button{margin-top:10px;padding:10px;background:#6d28d9;color:#fff;border:none}
    .suggestion{background:#f3f0ff;padding:10px;margin-top:10px;border-radius:10px}
  </style>
</head>

<body>

<div class="topbar">
  <div><b>Diagnose Me</b></div>
  <div id="pilotStatus"></div>
</div>

<div class="container">

  <div class="sidebar">
    <div onclick="togglePilotMode()">Pilot Mode</div>

    <div onclick="showPersonalTool()">Personal Health Check</div>

    <div onclick="showDocumentationAssistant()">Clinical Assistant</div>
    <div onclick="showDRG()">DRG Engine</div>
    <div onclick="showMetrics()">Pilot Metrics</div>
  </div>

  <div class="content" id="app"></div>

</div>

<script src="app.js"></script>
</body>
</html>
