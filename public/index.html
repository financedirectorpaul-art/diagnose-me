<!DOCTYPE html>
<html>
<head>
  <title>Diagnose Me Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body{font-family:Arial;background:#0b0720;color:#fff;margin:0}
    .topbar{padding:15px;background:#120d2f;display:flex;justify-content:space-between}
    .container{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 60px)}
    .sidebar{background:#120d2f;padding:15px}
    .sidebar div{margin-bottom:10px;cursor:pointer}
    .content{padding:20px}
    .card{background:#fff;color:#111;padding:20px;border-radius:12px;margin-bottom:20px}
    textarea,input{width:100%;margin-top:10px;padding:10px}
    button{margin-top:10px;padding:10px;background:#6d28d9;color:#fff;border:none}
    .condition{background:#f3f0ff;padding:10px;margin-top:10px;border-radius:10px}
    .metric{background:#111;color:#fff;padding:10px;margin-top:10px;border-radius:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px}
    th,td{padding:8px;border-bottom:1px solid #ccc}
  </style>
</head>

<body>

<div class="topbar">
  <div><b>Diagnose Me Platform</b></div>
</div>

<div class="container">

  <div class="sidebar">
    <div onclick="showHome()">Home</div>
    <div onclick="showPersonal()">Personal Health Check</div>
    <div onclick="showDRG()">DRG Engine</div>
    <div onclick="showCases()">Case Tracking</div>
  </div>

  <div class="content" id="app"></div>

</div>

<script>

// ================= HOME =================

function showHome(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Welcome</h2>
      <p>Use the Personal Health Check or DRG tools.</p>
    </div>
  `;
}

// ================= PERSONAL =================

function showPersonal(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Personal Health Check</h2>
      <textarea id="symptom" placeholder="Describe symptoms"></textarea>
      <button onclick="runDiagnosis()">Analyse</button>
      <div id="result"></div>
    </div>
  `;
}

async function runDiagnosis(){

  const symptoms = document.getElementById("symptom").value;

  const res = await fetch("/ai/personal-check", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ symptoms })
  });

  const data = await res.json();

  document.getElementById("result").innerHTML = `
    <h3>Possible Conditions</h3>

    ${(data.conditions || []).map(c => `
      <div class="condition">
        <b>${c.name}</b><br>
        Likelihood: ${c.likelihood}<br>
        ${c.reason}
      </div>
    `).join("")}

    <h3>Overall Assessment</h3>
    <div class="condition">${data.overall_assessment}</div>

    <h3>Follow-up Questions</h3>
    <div class="condition">
      ${(data.follow_up_questions || []).join("<br>")}
    </div>

    <h3>Urgency</h3>
    <div class="condition">${data.urgency}</div>
  `;
}

// ================= DRG =================

function showDRG(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>DRG Engine</h2>
      <input id="dx" placeholder="Diagnosis">
      <button onclick="runDRG()">Estimate</button>
      <div id="drgOut"></div>
    </div>
  `;
}

async function runDRG(){

  const diagnosis = document.getElementById("dx").value;

  const res = await fetch("/drg/estimate", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ diagnosis })
  });

  const data = await res.json();

  document.getElementById("drgOut").innerHTML = `
    <div class="metric">Predicted: $${data.funding}</div>
  `;
}

// ================= CASES =================

async function showCases(){

  const res = await fetch("/pilot/data");
  const data = await res.json();

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Case Tracking</h2>

      <table>
        <tr>
          <th>ID</th>
          <th>Predicted</th>
          <th>Actual</th>
          <th>Variance</th>
        </tr>

        ${data.map(r => `
          <tr>
            <td>${r.id}</td>
            <td>$${r.predicted}</td>
            <td>$${r.actual}</td>
            <td>$${r.actual - r.predicted}</td>
          </tr>
        `).join("")}
      </table>
    </div>
  `;
}

// ================= INIT =================

showHome();

</script>

</body>
</html>
