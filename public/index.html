<!DOCTYPE html>
<html>
<head>
  <title>DOCTORPD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body{margin:0;background:#0f172a;color:#e5e7eb;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
    .layout{display:grid;grid-template-columns:260px 1fr;height:100vh}
    .sidebar{background:#020617;border-right:1px solid #1e293b;padding:18px}
    .brand{font-size:24px;font-weight:800;margin-bottom:24px;color:#7c3aed}
    .nav{padding:12px 16px;border-radius:12px;cursor:pointer;margin-bottom:8px;color:#cbd5e1;font-weight:500}
    .nav:hover{background:#1e293b;color:white}
    .main{display:flex;flex-direction:column;height:100vh;overflow:hidden}
    .doctor{display:flex;align-items:center;gap:16px;padding:16px 24px;background:#020617;border-bottom:1px solid #1e293b}
    .avatar{width:64px;height:64px;border-radius:50%;background:#1e293b;overflow:hidden;border:3px solid #7c3aed}
    .avatar img{width:100%;height:100%;object-fit:cover}
    .doctor-name{font-weight:700;font-size:19px}
    .doctor-sub{color:#94a3b8;font-size:13px}
    .mode-toggle{display:flex;gap:8px;margin-left:auto;background:#1e293b;border-radius:9999px;padding:4px}
    .mode-btn{padding:8px 18px;border-radius:9999px;font-size:14px;cursor:pointer;font-weight:500}
    .mode-btn.active{background:#7c3aed;color:white}
    .gender-toggle{display:flex;gap:8px;margin-left:16px}
    .gender-btn{padding:8px 16px;border-radius:9999px;font-size:14px;cursor:pointer;background:#1e293b;color:#cbd5e1;font-weight:500}
    .gender-btn.active{background:#7c3aed;color:white}
    .chat{flex:1;overflow-y:auto;padding:24px 28px;scroll-behavior:smooth;background:#0a1120}
    .row{display:flex;gap:12px;margin-bottom:20px}.user-row{justify-content:flex-end}
    .bubble{max-width:78%;padding:16px 20px;border-radius:20px;line-height:1.55;white-space:pre-wrap;position:relative;font-size:16px}
    .ai{background:#1e293b;border:1px solid #334155;border-top-left-radius:4px}
    .user{background:#7c3aed;border-top-right-radius:4px}
    .listen-btn{position:absolute;right:14px;bottom:12px;font-size:20px;cursor:pointer;opacity:0.75}
    .listen-btn:hover{opacity:1}
    .inputbar{display:flex;gap:12px;padding:18px 24px;background:#020617;border-top:1px solid #1e293b}
    input{width:100%;box-sizing:border-box;background:#1e293b;color:white;border:1px solid #334155;border-radius:16px;padding:16px 20px;font-size:16px}
    button{background:#7c3aed;color:white;border:none;padding:14px 22px;border-radius:16px;cursor:pointer;font-weight:700;font-size:16px}
    button.secondary{background:#334155}
    .mic-btn{font-size:26px;width:58px;height:58px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:#7c3aed}
    .listening{animation: pulse 1.5s infinite}
    @keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
    .panel-wrapper{border-top:1px solid #1e293b;background:#020617}
    .panel-header{padding:12px 24px;background:#1e293b;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-weight:500}
    .panel-content{padding:20px;max-height:340px;overflow-y:auto}
  </style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <div class="brand">DOCTORPD</div>
    <div class="nav" onclick="showChat()">Clinical Chat</div>
    <div class="nav" onclick="showDiagnostics()">Diagnostics</div>
    <div class="nav" onclick="showDocumentation()">Documentation Assistant</div>
    <div class="nav" onclick="showFunding()">Funding Estimator</div>
    <div class="nav" onclick="showCases()">Case Tracking</div>
    <div class="nav" onclick="showMetrics()">Metrics</div>
    <div class="nav" onclick="showAudit()">Audit Trail</div>
  </div>
  <div id="app" class="main"></div>
</div>

<script>
let conversation={symptoms:"",answers:[],questionIndex:0};
let latestAI=null;
let documentation=[];
let activePrompts=[];
let isWaiting=false;
let currentDoctor="female";
let chatMode="guided";
let panelOpen = false;

// Stable Voice Engine
let voicesLoaded = false;
let femaleVoice = null;
let maleVoice = null;

function loadVoices() {
  const all = speechSynthesis.getVoices();
  if (all.length === 0) return;
  voicesLoaded = true;
  femaleVoice = all.find(v => v.lang === "en-AU" && /female|karen|tessa|alice|samantha|emma|olivia/i.test(v.name)) || all.find(v => /female|karen|tessa|alice|samantha|emma|olivia/i.test(v.name)) || all[0];
  maleVoice = all.find(v => v.lang === "en-AU" && /male|james|david|daniel|oliver|henry/i.test(v.name)) || all.find(v => /male|james|david|daniel|oliver|henry/i.test(v.name)) || all[1] || all[0];
}
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
  setTimeout(loadVoices, 800);
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  const utterance = new SpeechSynthesisUtterance(text);
  const profile = doctorProfiles[currentDoctor];
  utterance.voice = profile.voice === "female" ? femaleVoice : maleVoice;
  utterance.pitch = profile.voice === "female" ? 1.1 : 0.95;
  utterance.rate = 0.97;
  if (!voicesLoaded) { setTimeout(() => speak(text), 600); return; }
  speechSynthesis.speak(utterance);
}

const doctorProfiles = {
  female: { name:"Dr. Elena Voss", title:"DOCTORPD Clinical AI", avatar:"https://randomuser.me/api/portraits/women/44.jpg", voice:"female" },
  male:   { name:"Dr. James Harper", title:"DOCTORPD Clinical AI", avatar:"https://randomuser.me/api/portraits/men/32.jpg", voice:"male" }
};

function startVoiceInput() {
  if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
    alert("Voice input not supported in this browser. Please use Chrome or Edge.");
    return;
  }
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-AU";
  const micBtn = document.getElementById("micBtn");
  if (micBtn) micBtn.classList.add("listening");
  recognition.onresult = e => {
    const transcript = e.results[0][0].transcript;
    const input = document.getElementById("input");
    if (input) { input.value = transcript; send(); }
  };
  recognition.onerror = recognition.onend = () => { if (micBtn) micBtn.classList.remove("listening"); };
  recognition.start();
}

function switchDoctor(gender) {
  currentDoctor = gender;
  document.querySelectorAll('.gender-btn').forEach(b => b.classList.toggle('active', b.dataset.gender===gender));
  showChat();
}

function setMode(mode) {
  chatMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode===mode));
  showChat();
}

function money(n){return "$"+Number(n||0).toLocaleString();}
function scrollChat(){const chat=document.getElementById("chat");if(chat)chat.scrollTop=chat.scrollHeight;}
function copyText(id){navigator.clipboard.writeText(document.getElementById(id).value);alert("Copied");}

function togglePanel() {
  panelOpen = !panelOpen;
  const content = document.getElementById("panelContent");
  if (content) content.style.display = panelOpen ? "block" : "none";
}

function showChat(){
  conversation={symptoms:"",answers:[],questionIndex:0};
  latestAI=null;activePrompts=[];isWaiting=false;
  document.getElementById("app").innerHTML=`
    <div class="doctor">
      <div class="avatar"><img src="${doctorProfiles[currentDoctor].avatar}" alt="Doctor"></div>
      <div>
        <div class="doctor-name">${doctorProfiles[currentDoctor].name}</div>
        <div class="doctor-sub">${doctorProfiles[currentDoctor].title}</div>
      </div>
      <div class="mode-toggle">
        <div class="mode-btn ${chatMode==='guided'?'active':''}" data-mode="guided" onclick="setMode('guided')">Guided Triage</div>
        <div class="mode-btn ${chatMode==='free'?'active':''}" data-mode="free" onclick="setMode('free')">Ask Doctor Anything</div>
      </div>
      <div class="gender-toggle">
        <div class="gender-btn ${currentDoctor==='female'?'active':''}" data-gender="female" onclick="switchDoctor('female')">👩‍⚕️ Female</div>
        <div class="gender-btn ${currentDoctor==='male'?'active':''}" data-gender="male" onclick="switchDoctor('male')">👨‍⚕️ Male</div>
      </div>
    </div>
    <div id="chat" class="chat"></div>
    <div class="panel-wrapper">
      <div class="panel-header" onclick="togglePanel()">
        <span>📋 Clinical Tools (Note, FHIR, Override)</span>
        <span id="panelToggle">${panelOpen ? '▼' : '▲'}</span>
      </div>
      <div id="panelContent" class="panel-content" style="display:none;">
        <b>Structured Clinical Note</b>
        <textarea id="note"></textarea>
        <button onclick="generateNote()">Generate Note</button>
        <button class="secondary" onclick="copyText('note')">Copy Note</button>
        <br><br>
        <b>FHIR R4 Bundle</b>
        <textarea id="fhir"></textarea>
        <button onclick="generateFHIR()">Generate FHIR</button>
        <button class="secondary" onclick="copyText('fhir')">Copy FHIR</button>
        <br><br>
        <b>Clinician Override</b>
        <input id="overrideName" placeholder="Clinician name">
        <textarea id="overrideReason" placeholder="Reason for override"></textarea>
        <textarea id="overrideAssessment" placeholder="Clinician override assessment"></textarea>
        <button onclick="submitOverride()">Submit Override</button>
      </div>
    </div>
    <div class="inputbar">
      <input id="input" placeholder="${chatMode==='free'?'Ask DOCTORPD anything...':'Describe symptoms or speak your answer...'}"/>
      <button onclick="send()">Send</button>
      <button class="mic-btn" id="micBtn" onclick="startVoiceInput()" title="Speak">🎤</button>
      <button class="secondary" onclick="showChat()">New Chat</button>
    </div>`;

  document.getElementById("input").addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();send();}});
  addAI(`Hi, I'm ${doctorProfiles[currentDoctor].name.split(" ")[1]}. How can I help you today?`);
}

function addAI(text){
  const chat=document.getElementById("chat");
  const id = "msg-" + Date.now();
  chat.innerHTML += `<div class="row" id="${id}"><div class="avatar" style="width:42px;height:42px;overflow:hidden;border-radius:50%;"><img src="${doctorProfiles[currentDoctor].avatar}" style="width:100%;height:100%;object-fit:cover"></div><div class="bubble ai">${text}<span class="listen-btn" onclick="speak('${text.replace(/'/g, "\\'")}')">🔊</span></div></div>`;
  scrollChat();
  speak(text);
}

function addUser(text){
  const chat=document.getElementById("chat");
  chat.innerHTML+=`<div class="row user-row"><div class="bubble user">${text}</div></div>`;
  scrollChat();
}

async function send(){
  if(isWaiting) return;
  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;
  addUser(text);
  input.value="";
  isWaiting=true;
  addAI("Thinking...");

  let res, data;
  if(chatMode === "free"){
    res = await fetch("/ai/ask-doctor",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({question:text,context:latestAI||conversation})});
    data = await res.json();
    document.getElementById("chat").lastElementChild.remove();
    addAI(data.response || "Sorry, I couldn't process that.");
  } else {
    if(!conversation.symptoms){conversation.symptoms=text;}else{conversation.answers.push(text);conversation.questionIndex+=1;}
    res=await fetch("/ai/personal-check",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(conversation)});
    data=await res.json();
    document.getElementById("chat").lastElementChild.remove();
    if(data.mode==="question"){addAI(data.question);isWaiting=false;return;}
    latestAI=data;
    renderFinal(data);
    generateNote();
    generateFHIR();
  }
  isWaiting=false;
}

// ==================== ORIGINAL FUNCTIONS (unchanged) ====================
function renderFinal(data){
  activePrompts=data.revenue_prompts||[];
  let out="";
  out+=`Triage Score: ${data.triage_score}/100\n`;
  out+=`Urgency: ${data.urgency}\n`;
  out+=`Confidence: ${data.confidence||"N/A"}%\n`;
  out+=`Uncertainty: ${data.uncertainty||"N/A"}\n\n`;
  out+=`Assessment:\n${data.overall_assessment}\n\n`;
  if(data.differential?.length){
    out+="Differential Ranking:\n";
    data.differential.forEach(d=>{out+=`${d.rank}. ${d.condition} — ${d.probability}% (${d.likelihood})\nICD: ${d.icd_suggestion?.code||"N/A"} — ${d.icd_suggestion?.description||""}\n`;});
    out+="\n";
  }
  if(data.conditions?.length){
    out+="Possible Conditions:\n";
    data.conditions.forEach(c=>{out+=`• ${c.name} (${c.likelihood}) — ${c.reason}\n`;});
    out+="\n";
  }
  if(data.icd){out+=`ICD-10 Suggestion:\n${data.icd.code} (${data.icd.description}) — ${data.icd.confidence}%\n\n`;}
  out+=`CPT Suggestion: ${data.cpt||"N/A"}\n`;
  out+=`Denial Risk: ${data.denial_risk||"N/A"}\n\n`;
  if(data.missing_information?.length){out+="Missing Information:\n";data.missing_information.forEach(m=>out+=`• ${m}\n`);out+="\n";}
  if(data.funding){out+=`Funding Insight:\nBaseline: ${money(data.funding.baseline)}\nPotential: ${money(data.funding.potential)}\nUplift: ${money(data.funding.uplift)}\n\n`;}
  if(data.advice){out+=`Advice:\n${data.advice}\n\n`;}
  out+=data.legal_notice||"Decision support only. Requires clinician review.";
  addAI(out);
  if(activePrompts.length){
    let html="<b>Documentation Opportunities</b><br>";
    activePrompts.forEach((p,i)=>{html+=`<span class="clickable" onclick="addPrompt(${i})">• ${p.message} → ${money(p.value||p.estimated_uplift)}</span><br>`;});
    addAI(html);
  }
}

function addPrompt(i){const p=activePrompts[i];documentation.push(`${p.message||p.prompt} → ${money(p.value||p.estimated_uplift)}`);generateNote();}

function generateNote(){
  const note=`
LEGAL NOTICE:
Decision support only. Requires clinician review.
PRESENTING COMPLAINT:
${conversation.symptoms||"Not recorded"}
RESPONSES:
${conversation.answers.join("\n")||"Not recorded"}
ASSESSMENT:
${latestAI?.overall_assessment||"Not recorded"}
DIFFERENTIAL:
${(latestAI?.differential||[]).map(d=>`${d.rank}. ${d.condition} (${d.probability}%) ICD: ${d.icd_suggestion?.code||"N/A"}`).join("\n")||"Not recorded"}
ICD:
${latestAI?.icd?.code||"N/A"} - ${latestAI?.icd?.description||"N/A"}
TRIAGE:
Score: ${latestAI?.triage_score||"N/A"}
Urgency: ${latestAI?.urgency||"N/A"}
Confidence: ${latestAI?.confidence||"N/A"}
DOCUMENTATION OPPORTUNITIES:
${documentation.join("\n")||"None"}
PLAN:
- Clinician review required.
- Confirm diagnosis clinically.
- Validate coding with qualified coder.
- Escalate if red flags or worsening symptoms.
`;
  const el=document.getElementById("note");if(el)el.value=note.trim();
}

function generateFHIR(){
  const bundle={resourceType:"Bundle",type:"collection",timestamp:new Date().toISOString(),entry:[
    {resource:{resourceType:"Patient",id:"patient-demo"}},
    {resource:{resourceType:"Condition",code:{text:`${latestAI?.icd?.code||"N/A"} ${latestAI?.icd?.description||""}`},note:[{text:latestAI?.overall_assessment||""}]}},
    {resource:{resourceType:"Observation",code:{text:"AI triage score"},valueInteger:latestAI?.triage_score||0}},
    {resource:{resourceType:"Observation",code:{text:"AI confidence score"},valueInteger:latestAI?.confidence||0}}
  ]};
  const el=document.getElementById("fhir");if(el)el.value=JSON.stringify(bundle,null,2);
}

async function submitOverride(){
  const payload={clinician:document.getElementById("overrideName").value,reason:document.getElementById("overrideReason").value,assessment:document.getElementById("overrideAssessment").value,original:latestAI};
  await fetch("/clinical/override",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
  documentation.push("CLINICIAN OVERRIDE: "+payload.assessment+" | Reason: "+payload.reason);
  generateNote();
  alert("Override logged");
}

// All other original functions (showDiagnostics, runDiagnostics, etc.) remain unchanged
function showDiagnostics(){ /* your original */ }
async function runDiagnostics(){ /* your original */ }
function showDocumentation(){ /* your original */ }
async function analyseDoc(){ /* your original */ }
function showFunding(){ /* your original */ }
async function runFunding(){ /* your original */ }
async function saveCase(predicted){ /* your original */ }
async function showCases(){ /* your original */ }
async function showMetrics(){ /* your original */ }
async function showAudit(){ /* your original */ }

showChat();
</script>
</body>
</html>
